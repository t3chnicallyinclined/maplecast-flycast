<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
#game { width: 100vw; height: 100vh; }
.ejs_canvas { object-position: center center !important; width: 100% !important; height: 100% !important; }
.ejs_menu_bar { display: none !important; }
.ejs_parent, .ejs_parent > div { width: 100% !important; height: 100% !important; overflow: hidden !important; }
</style>
</head>
<body>
<div id="game"></div>

<!-- WebGL2 compatibility patches (required for flycast WASM) -->
<script>
  (function() {
    var origWarn = console.warn;
    console.warn = function() {
      if (arguments.length > 0 && typeof arguments[0] === 'string') {
        var msg = arguments[0];
        if (msg.indexOf('__syscall_mprotect') !== -1) return;
        if (msg.indexOf('is not a valid value') !== -1) return;
      }
      return origWarn.apply(console, arguments);
    };
  })();
  (function() {
    var origGetContext = HTMLCanvasElement.prototype.getContext;
    HTMLCanvasElement.prototype.getContext = function(type, attrs) {
      var ctx = origGetContext.call(this, type, attrs);
      if (ctx && (type === 'webgl2' || type === 'experimental-webgl2') && !ctx.__flycastPatched) {
        ctx.__flycastPatched = true;
        var origGetParam = ctx.getParameter.bind(ctx);
        ctx.getParameter = function(pname) {
          if (pname === 0x1F02 || pname === ctx.VERSION) return 'OpenGL ES 3.0 WebGL 2.0';
          if (pname === 0x8B8C || pname === ctx.SHADING_LANGUAGE_VERSION) return 'OpenGL ES GLSL ES 3.00';
          return origGetParam(pname);
        };
        var origGetError = ctx.getError.bind(ctx);
        ctx.getError = function() {
          var err = origGetError();
          while (err === 0x500) { err = origGetError(); }
          return err;
        };
        var texBindings = {};
        texBindings[ctx.TEXTURE_2D] = ctx.TEXTURE_BINDING_2D;
        texBindings[ctx.TEXTURE_CUBE_MAP] = ctx.TEXTURE_BINDING_CUBE_MAP;
        if (ctx.TEXTURE_3D) texBindings[ctx.TEXTURE_3D] = ctx.TEXTURE_BINDING_3D;
        if (ctx.TEXTURE_2D_ARRAY) texBindings[ctx.TEXTURE_2D_ARRAY] = ctx.TEXTURE_BINDING_2D_ARRAY;
        var origTexParameteri = ctx.texParameteri.bind(ctx);
        ctx.texParameteri = function(target, pname, param) {
          var b = texBindings[target];
          if (b && !origGetParam(b)) return;
          return origTexParameteri(target, pname, param);
        };
        var origTexParameterf = ctx.texParameterf.bind(ctx);
        ctx.texParameterf = function(target, pname, param) {
          var b = texBindings[target];
          if (b && !origGetParam(b)) return;
          return origTexParameterf(target, pname, param);
        };
      }
      return ctx;
    };
  })();
</script>

<script>
  EJS_cacheConfig = { enabled: false };
  // Show all EmulatorJS controls for debugging
  EJS_player = '#game';
  EJS_core = 'flycast';
  EJS_gameUrl = 'roms/mvc2.chd';
  EJS_pathtodata = 'ejs-data/';
  EJS_biosUrl = 'bios/dc_boot.bin';
  EJS_startOnLoaded = true;
  EJS_color = '#0f0';
  EJS_disableLocalStorage = true;
  EJS_defaultOptions = {
    'reicast_hle_bios': 'enabled',
    'reicast_force_freeplay': 'enabled',
    'reicast_enable_rttb': 'enabled',
    'reicast_enable_dsp': 'disabled',
    'reicast_alpha_sorting': 'per-strip (fast, least accurate)',
    'reicast_oit_layers': '4',
    'reicast_delay_frame_swapping': 'disabled',
    'reicast_frame_skipping': '0',
    'reicast_auto_skip_frame': '0',
    'reicast_emulate_framebuffer': 'disabled',
    'reicast_enable_dsp': 'disabled',
    'reicast_custom_textures': 'disabled',
  };

  var CORE_OPTS = Object.entries(EJS_defaultOptions).map(function(e) { return e[0] + ' = "' + e[1] + '"'; }).join('\n') + '\n';

  // Patch startGame to set up BIOS + core options
  (function() {
    var iv = setInterval(function() {
      var emu = window.EJS_emulator;
      if (!emu || emu.__flycastPatched) return;
      emu.__flycastPatched = true;
      clearInterval(iv);
      var origStartGame = emu.startGame;
      emu.startGame = async function() {
        try {
          if (this.gameManager && this.gameManager.FS) {
            var FS = this.gameManager.FS;
            try {
              var resp = await fetch('bios/dc_flash.bin');
              var buf = await resp.arrayBuffer();
              FS.writeFile('/dc_flash.bin', new Uint8Array(buf));
            } catch(e) {}
            try { if (!FS.analyzePath('/dc').exists) FS.mkdir('/dc'); } catch(e) {}
            ['dc_boot.bin', 'dc_flash.bin'].forEach(function(f) {
              try {
                if (FS.analyzePath('/' + f).exists && !FS.analyzePath('/dc/' + f).exists)
                  FS.writeFile('/dc/' + f, FS.readFile('/' + f));
              } catch(e) {}
            });
            if (this.Module && this.Module.callbacks) {
              var origCb = this.Module.callbacks.setupCoreSettingFile;
              this.Module.callbacks.setupCoreSettingFile = function(filePath) {
                try { FS.writeFile(filePath, CORE_OPTS); } catch(e) {}
                if (origCb) origCb(filePath);
              };
            }
            var cfgPath = '/home/web_user/.config/retroarch/retroarch.cfg';
            try {
              var cfg = new TextDecoder().decode(FS.readFile(cfgPath));
              if (cfg.indexOf('system_directory') === -1)
                FS.writeFile(cfgPath, cfg + 'system_directory = "/"\n');
            } catch(e) {}
          }
        } catch(e) { console.error('[maplecast] startGame patch failed:', e); }
        return origStartGame.apply(this, arguments);
      };
    }, 50);
  })();

  EJS_onGameStart = function() {
    console.log('[maplecast] Game loaded, auto-starting mirror...');
    // Set internal resolution high for quality, EmulatorJS scales it down to fit
    var emu = window.EJS_emulator;
    if (emu && emu.gameManager) {
      emu.gameManager.setVariable('reicast_internal_resolution', '1280x960');
      emu.gameManager.setVariable('reicast_cable_type', 'VGA');
      console.log('[maplecast] Set internal resolution to 1280x960 VGA');
    }
    // Expose _startMirror to parent window
    if (window.parent && window.parent !== window) {
      window.parent._startMirror = window._startMirror;
    }
    // Auto-start: pause CPU + start mirror after brief renderer init
    setTimeout(function() { window._startMirror(); }, 1000);
  };

  var MIRROR_SERVER = 'ws://' + location.hostname + ':7200';

  window._startMirror = function() {
    if (window._mirrorStarted) { console.log('[mirror] Already started'); return; }
    window._mirrorStarted = true;
    var emu = window.EJS_emulator;
    if (!emu || !emu.Module) { console.error('[mirror] EmulatorJS not ready'); window._mirrorStarted = false; return; }
    var Module = emu.Module;
    if (typeof Module._mirror_init !== 'function') { console.error('[mirror] _mirror_init not found'); window._mirrorStarted = false; return; }

    emu.pause();
    console.log('[mirror] CPU paused');

    Module._mirror_init();
    console.log('[mirror] Mirror initialized');

    var bufSize = 256 * 1024;
    var buf = Module._malloc(bufSize);
    var frames = 0, startTime = 0;

    function renderFrame(data) {
      var arr = new Uint8Array(data instanceof ArrayBuffer ? data : data.buffer);
      if (arr.length < 80) return;
      if (arr.length > bufSize) { Module._free(buf); bufSize = arr.length + 65536; buf = Module._malloc(bufSize); }
      Module.writeArrayToMemory(arr, buf);
      Module._mirror_render_frame(buf, arr.length);
      frames++;
      if (frames % 300 === 0) {
        var fps = frames / ((performance.now() - startTime) / 1000);
        console.log('[mirror] ' + fps.toFixed(0) + ' fps | relay:', relay ? relay.getStats() : 'none');
      }
    }

    function applySync(data) {
      var arr = new Uint8Array(data instanceof ArrayBuffer ? data : data.buffer);
      console.log('[mirror] SYNC: ' + (arr.length/1024/1024).toFixed(1) + ' MB');
      if (arr.length > bufSize) { Module._free(buf); bufSize = arr.length + 65536; buf = Module._malloc(bufSize); }
      Module.writeArrayToMemory(arr, buf);
      try { if (Module._mirror_apply_sync) Module._mirror_apply_sync(buf, arr.length); }
      catch (err) { console.warn('[mirror] SYNC error:', err.message); }
    }

    var relay = null;

    function connectMirror() {
      console.log('[mirror] Connecting to', MIRROR_SERVER);
      var ws = new WebSocket(MIRROR_SERVER);
      ws.binaryType = 'arraybuffer';
      ws.onopen = function() {
        startTime = performance.now(); frames = 0;
        // Create relay instance and announce readiness
        relay = new MapleCastRelay(ws, renderFrame, applySync);
        ws.send(JSON.stringify({ type: 'relay_ready', canRelay: true }));
      };
      ws.onclose = function() {
        if (relay) { relay.destroy(); relay = null; }
        setTimeout(connectMirror, 2000);
      };
      ws.onerror = function() { console.log('[mirror] WebSocket error'); };
      ws.onmessage = function(e) {
        if (typeof e.data === 'string') {
          // JSON messages — route relay_* to relay, ignore others
          try {
            var msg = JSON.parse(e.data);
            if (msg.type && msg.type.startsWith('relay_') && relay) {
              relay.handleMessage(msg);
            }
          } catch(err) {}
          return;
        }
        // Binary messages — SYNC or delta frames
        var data = new Uint8Array(e.data);
        if (data.length < 8) return;
        // Check for raw SYNC or ZCST-compressed SYNC
        var isSYNC = data[0]===0x53 && data[1]===0x59 && data[2]===0x4E && data[3]===0x43;
        var isZCST = data[0]===0x5A && data[1]===0x43 && data[2]===0x53 && data[3]===0x54;
        var dv = new DataView(e.data);
        var isCompSync = isZCST && data.length >= 8 && dv.getUint32(4, true) > 1048576;
        if (isSYNC || isCompSync) {
          // SYNC from server (seeds only)
          if (relay) relay.handleServerSync(e.data);
          else applySync(e.data);
          return;
        }
        // Delta frame from server (seeds only) — route through relay
        if (relay) relay.handleServerFrame(e.data);
        else renderFrame(e.data);
      };
    }
    connectMirror();
  };
</script>

<script src="relay.js"></script>
<script src="ejs-data/loader.js"></script>
</body>
</html>
