<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MapleCast Skin Picker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 16px; max-width: 700px; margin: 0 auto; }
h1 { color: #4fc3f7; margin-bottom: 12px; }
.status { font-size: 0.8em; margin-bottom: 12px; }
.connected { color: #66bb6a; } .disconnected { color: #ef5350; }
section { background: #16213e; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
section h2 { font-size: 0.95em; color: #90caf9; margin-bottom: 8px; border-bottom: 1px solid #2a3a5c; padding-bottom: 4px; }
.char-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
.char-card { background: #0f3460; border-radius: 6px; padding: 8px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
.char-card:hover { border-color: #4fc3f7; }
.char-card.selected { border-color: #4fc3f7; background: #1a4a80; }
.char-card .name { font-weight: bold; color: #4fc3f7; }
.char-card .info { font-size: 0.75em; color: #999; }
.char-card.active .name { color: #66bb6a; }
.probe-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 3px; margin: 8px 0; }
.probe-cell { width: 100%; aspect-ratio: 1; border-radius: 4px; cursor: pointer; border: 2px solid transparent; }
.probe-cell:hover { border-color: #fff; }
.probe-cell.selected { border-color: #4fc3f7; }
button { background: #4fc3f7; color: #000; border: none; border-radius: 5px; padding: 8px 16px; cursor: pointer; font-weight: bold; margin: 4px; }
button:hover { filter: brightness(1.15); }
button.danger { background: #ef5350; color: #fff; }
.skin-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; max-height: 400px; overflow-y: auto; }
.skin-thumb { background: #0f3460; border-radius: 4px; padding: 4px; cursor: pointer; text-align: center; border: 2px solid transparent; }
.skin-thumb:hover { border-color: #4fc3f7; }
.skin-thumb img { width: 100%; border-radius: 3px; }
.skin-thumb .label { font-size: 0.7em; color: #aaa; margin-top: 2px; }
.step { display: none; }
.step.active { display: block; }
.v { color: #4fc3f7; font-weight: 600; }
</style>
</head>
<body>
<h1>MapleCast Skin Picker</h1>
<div class="status">Server: <span id="ws-status" class="disconnected">Connecting...</span></div>

<!-- Step 1: Show match info, pick a character -->
<section id="step1" class="step active">
  <h2>Step 1: Select Character</h2>
  <p style="font-size:0.85em;margin-bottom:8px">Pick which character to skin. Must be in a match.</p>
  <div id="match-chars" class="char-grid"></div>
  <button onclick="refreshMatch()">Refresh Match Info</button>
</section>

<!-- Step 2: Pick a skin (bank auto-calculated from slot) -->
<section id="step2" class="step">
  <h2>Step 2: Pick Skin for <span id="skin-char-name" class="v">?</span></h2>
  <div id="bank-info" style="font-size:0.8em;color:#999;margin-bottom:8px"></div>
  <div style="margin-bottom:8px">
    <button onclick="applyTestColors()">Pink</button>
    <button onclick="applyTestColors('gold')">Gold</button>
    <button onclick="applyTestColors('ice')">Ice Blue</button>
    <button onclick="applyTestColors('fire')">Fire Red</button>
    <button onclick="applyTestColors('toxic')">Toxic Green</button>
    <button onclick="applyTestColors('shadow')">Shadow</button>
    <button onclick="applyTestColors('chrome')">Chrome</button>
    <button class="danger" onclick="clearSkin()">Reset</button>
  </div>
  <div id="skin-list" style="margin-top:10px"></div>
  <div id="skin-loading" style="font-size:0.8em;color:#999"></div>
</section>

<script>
const PORT = new URLSearchParams(location.search).get('port') || 7211;
const HOST = new URLSearchParams(location.search).get('host') || 'localhost';
let ws, rid = 0;
let selectedSlot = null, selectedCharId = null, selectedCharName = null;
let probeBank = -1;
let bankColors = [];

function send(cmd, extra = {}) {
  return new Promise(resolve => {
    if (!ws || ws.readyState !== 1) { resolve(null); return; }
    const id = String(++rid);
    const handler = e => {
      const m = JSON.parse(e.data);
      if (m.reply_id === id) { ws.removeEventListener('message', handler); resolve(m); }
    };
    ws.addEventListener('message', handler);
    ws.send(JSON.stringify({ cmd, reply_id: id, ...extra }));
  });
}

function connect() {
  ws = new WebSocket(`ws://${HOST}:${PORT}`);
  ws.onopen = () => {
    document.getElementById('ws-status').textContent = 'Connected';
    document.getElementById('ws-status').className = 'connected';
    refreshMatch();
  };
  ws.onclose = () => {
    document.getElementById('ws-status').textContent = 'Disconnected';
    document.getElementById('ws-status').className = 'disconnected';
    setTimeout(connect, 2000);
  };
}

async function refreshMatch() {
  const resp = await send('match_info');
  if (!resp || !resp.ok) return;
  const chars = resp.data.characters;
  let html = '';
  // Show P1 characters
  for (const c of chars) {
    const isP1 = c.slot.startsWith('P1');
    if (!isP1) continue;
    const activeClass = c.active ? 'active' : '';
    html += `<div class="char-card ${activeClass}" onclick="selectChar('${c.slot}', ${c.charId}, '${c.name}')">
      <div class="name">${c.name}</div>
      <div class="info">${c.slot} | pal=${c.palette} | hp=${c.health} ${c.active ? '(ON SCREEN)' : ''}</div>
    </div>`;
  }
  html += '<div style="grid-column:1/-1;font-size:0.75em;color:#666;text-align:center">--- P2 ---</div>';
  for (const c of chars) {
    if (c.slot.startsWith('P1')) continue;
    const activeClass = c.active ? 'active' : '';
    html += `<div class="char-card ${activeClass}" onclick="selectChar('${c.slot}', ${c.charId}, '${c.name}')">
      <div class="name">${c.name}</div>
      <div class="info">${c.slot} | pal=${c.palette} | hp=${c.health} ${c.active ? '(ON SCREEN)' : ''}</div>
    </div>`;
  }
  document.getElementById('match-chars').innerHTML = html;
}

// Bank formula: bank = 16 * (char_pair + 1) + (8 * player_side)
// Confirmed with all 6 simultaneous skins 2026-04-10
function slotToBank(slot) {
  const map = { P1C1: 16, P2C1: 24, P1C2: 32, P2C2: 40, P1C3: 48, P2C3: 56 };
  return map[slot] || 16;
}

function selectChar(slot, charId, name) {
  selectedSlot = slot;
  selectedCharId = charId;
  selectedCharName = name;
  probeBank = slotToBank(slot);
  // Highlight
  document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  // Show step 2 (now directly the skin picker)
  document.getElementById('step2').classList.add('active');
  document.getElementById('skin-char-name').textContent = name;
  document.getElementById('bank-info').textContent =
    `${slot} → PVR bank ${probeBank} (entries ${probeBank*16}-${probeBank*16+15})`;
}

// Store original palette per bank so we can restore on reset
const savedPalettes = {};

async function saveOriginalPalette(bank) {
  if (savedPalettes[bank]) return; // already saved
  const resp = await send('palette_read', { index: bank * 16, count: 16 });
  if (resp && resp.ok) {
    savedPalettes[bank] = resp.data.colors;
  }
}

async function clearSkin() {
  // On headless server, PVR palette has no "default" — it's always zeros.
  // The game's original colors come from DC RAM palette data.
  // For now: find the character's palette in DC RAM and write it to PVR.
  if (probeBank < 0 || !selectedCharId) return;

  // Search DC RAM for this character's palette using known signatures
  // from PL??_DAT.BIN. The first 2 bytes are always 0x0000 (transparent).
  // We'll use palette_find to locate it, then read the 32 bytes.
  // For now, just clear the persist and write zeros (character goes invisible
  // briefly, then the game's next TA frame should re-establish normal rendering).

  // Clear ALL persistent overrides and re-apply the ones we want to keep
  await send('palette_clear');

  // Re-apply any other character skins that were set (not this one)
  // TODO: track per-bank overrides and only remove the target bank

  alert('Skin cleared. Character may appear invisible until next round/swap-in.');
}

async function applyTestColors(preset = 'pink') {
  if (probeBank < 0) { alert('Select a character first'); return; }
  // Save original before first override
  await saveOriginalPalette(probeBank);
  const palettes = {
    pink:   [0x0000,0xFF0F,0xFE0E,0xFD0D,0xFC0C,0xFB0B,0xFA0A,0xF909,0xF808,0xF707,0xF606,0xF505,0xF404,0xF303,0xF202,0xFF0F],
    gold:   [0x0000,0xF000,0xFFE6,0xFFD0,0xFC90,0xF850,0xF630,0xF220,0xF88D,0xF66B,0xF449,0xF227,0xF005,0xF003,0xFFFF,0xFF00],
    ice:    [0x0000,0xF335,0xF446,0xF557,0xF668,0xF779,0xF88A,0xF99B,0xFAAC,0xFBBD,0xFCCE,0xFDDF,0xFEEF,0xFFFF,0xFBBF,0xF88F],
    fire:   [0x0000,0xFF00,0xFE10,0xFD20,0xFC30,0xFB40,0xFA50,0xF960,0xF870,0xF780,0xFF90,0xFFA0,0xFFB0,0xFFC0,0xFFD0,0xFFE0],
    toxic:  [0x0000,0xF0F0,0xF1E0,0xF2D0,0xF3C0,0xF4B0,0xF5A0,0xF690,0xF7A0,0xF8B0,0xF9C0,0xFAD0,0xFBE0,0xFCF0,0xFDF0,0xFEF0],
    shadow: [0x0000,0xF111,0xF111,0xF222,0xF222,0xF333,0xF333,0xF444,0xF444,0xF555,0xF555,0xF666,0xF777,0xF888,0xF999,0xFAAA],
    chrome: [0x0000,0xF888,0xFBBB,0xFFFF,0xFDDD,0xF999,0xF666,0xFBBB,0xFFFF,0xFCCC,0xF888,0xFDDD,0xFFFF,0xFEEE,0xFBBB,0xFFFF],
  };
  const colors = palettes[preset] || palettes.pink;
  await send('palette_clear');
  await send('palette_write', { index: probeBank * 16, colors, persist: true });
}

// SurrealDB skin browser
const DB_HOST = new URLSearchParams(location.search).get('db') || HOST;
const DB_PORT = 8000;

async function queryDB(sql) {
  try {
    const resp = await fetch(`http://${DB_HOST}:${DB_PORT}/sql`, {
      method: 'POST',
      headers: {
        'Accept': 'application/json',
        'surreal-ns': 'maplecast',
        'surreal-db': 'mvc2',
        'Authorization': 'Basic ' + btoa('root:nobd_arcade_2026'),
      },
      body: sql,
    });
    const data = await resp.json();
    return data[0]?.result || [];
  } catch (e) {
    console.error('DB query failed:', e);
    return [];
  }
}

async function loadSkinsForChar(charDir) {
  document.getElementById('skin-loading').textContent = 'Loading skins...';
  const skins = await queryDB(
    `SELECT hash, author, palette_hex, colors, credit FROM skin WHERE char_dir = '${charDir}' ORDER BY author LIMIT 200;`
  );
  document.getElementById('skin-loading').textContent = '';

  if (skins.length === 0) {
    document.getElementById('skin-list').innerHTML =
      '<div style="color:#999;font-size:0.85em">No skins found in database. Run import_skins.py first.</div>';
    return;
  }

  let html = `<div style="font-size:0.8em;color:#999;margin-bottom:6px">${skins.length} community skins</div>`;
  html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;max-height:350px;overflow-y:auto">';
  for (const s of skins) {
    // Preview: show the palette as a color bar
    const colors = s.colors || hexToColors(s.palette_hex);
    let bar = '';
    for (let i = 1; i < 16; i++) {
      const c = colors[i];
      const r = ((c >> 8) & 0xF) * 17, g = ((c >> 4) & 0xF) * 17, b = (c & 0xF) * 17;
      bar += `<span style="display:inline-block;width:8px;height:16px;background:rgb(${r},${g},${b})"></span>`;
    }
    html += `<div style="background:#0f3460;border-radius:4px;padding:6px;cursor:pointer;border:1px solid #2a3a5c"
      onclick="applySkin(${JSON.stringify(colors)})"
      title="${s.credit || s.author}">
      <div style="margin-bottom:3px">${bar}</div>
      <div style="font-size:0.7em;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.author}</div>
    </div>`;
  }
  html += '</div>';
  document.getElementById('skin-list').innerHTML = html;
}

function hexToColors(hex) {
  const colors = [];
  for (let i = 0; i < hex.length; i += 4) {
    colors.push(parseInt(hex.substr(i, 4), 16));
  }
  return colors;
}

async function applySkin(colors) {
  if (probeBank < 0) { alert('Select a character first'); return; }
  await send('palette_clear');
  await send('palette_write', { index: probeBank * 16, colors, persist: true });
}

// Update selectChar to also load skins
const _origSelectChar = selectChar;
selectChar = function(slot, charId, name) {
  _origSelectChar(slot, charId, name);
  // Map char name to directory name for DB query
  const dirName = name.replace(/ /g, '_');
  loadSkinsForChar(dirName);
};

connect();
setInterval(refreshMatch, 5000);
</script>
</body>
</html>
