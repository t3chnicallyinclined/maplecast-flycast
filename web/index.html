<!DOCTYPE html>
<html>
<head>
<title>MapleCast - MVC2 Online</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; color: #0f0; }
canvas { image-rendering: pixelated; border: 2px solid #333; }
#status { margin: 10px; font-size: 16px; text-align: center; }
#lobby { margin: 10px; font-size: 13px; color: #888; }
#controls { margin: 10px; }
#diag { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.9); color: #0f0; font-size: 10px; padding: 8px; border: 1px solid #333; font-family: monospace; white-space: pre; min-width: 260px; }
button { background: #222; color: #0f0; border: 1px solid #0f0; padding: 10px 20px; margin: 5px; cursor: pointer; font-family: monospace; font-size: 14px; }
button:hover { background: #0f0; color: #000; }
button:disabled { opacity: 0.3; cursor: not-allowed; }
input { background: #111; color: #0f0; border: 1px solid #333; padding: 8px; font-family: monospace; font-size: 14px; width: 200px; text-align: center; }
.slot { display: inline-block; padding: 5px 10px; margin: 3px; border: 1px solid #333; min-width: 180px; text-align: center; line-height: 1.4; }
.slot.taken { border-color: #0f0; color: #0f0; }
.slot.me { border-color: #ff0; color: #ff0; }
.slot.empty { border-color: #333; color: #555; }
</style>
</head>
<body>
<div id="status">MapleCast - MVC2</div>
<canvas id="screen" width="640" height="480"></canvas>
<div id="lobby"></div>
<div id="controls">
  <input id="nameInput" placeholder="Your name" maxlength="16" />
  <button id="joinBtn" onclick="joinGame()">Press START to Join</button>
</div>
<div id="diag"></div>

<script>
const canvas = document.getElementById('screen');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const lobbyEl = document.getElementById('lobby');
const diagEl = document.getElementById('diag');
const joinBtn = document.getElementById('joinBtn');
const nameInput = document.getElementById('nameInput');

let ws = null;
let decoder = null;
let frameCount = 0;
let startTime = 0;
let gamepadInterval = null;
let mySlot = -1;
let myId = localStorage.getItem('maplecast_id');
if (!myId) { myId = crypto.randomUUID(); localStorage.setItem('maplecast_id', myId); }
let myName = localStorage.getItem('maplecast_name') || '';
nameInput.value = myName;

const diag = {
  fps: 0, serverFrame: 0, bytesPerFrame: 0, totalBytes: 0,
  decodeSamples: [], serverPipelineSamples: [], serverEncodeSamples: [],
  serverCopySamples: [], jitterSamples: [],
  prevRecvMs: 0,
  droppedFrames: 0, gamepadActive: false, inputSendCount: 0,
  frameIntervals: [], p1: {}, p2: {},
  decodeStartMs: 0,
};

function avg(arr) { return arr.length > 0 ? arr.reduce((a,b) => a+b, 0) / arr.length : 0; }

function updateDiag() {
  const kbps = startTime > 0 ? (diag.totalBytes * 8 / 1000 / ((performance.now() - startTime) / 1000)).toFixed(0) : '0';
  const p1 = diag.p1 || {};
  const p2 = diag.p2 || {};
  const srvPipe = (avg(diag.serverPipelineSamples) / 1000).toFixed(2);
  const srvEnc = (avg(diag.serverEncodeSamples) / 1000).toFixed(2);
  const srvCopy = (avg(diag.serverCopySamples) / 1000).toFixed(2);
  const dec = avg(diag.decodeSamples).toFixed(2);
  const jit = avg(diag.jitterSamples).toFixed(2);
  const fi = avg(diag.frameIntervals).toFixed(1);

  diagEl.textContent =
`=== MapleCast ===
FPS: ${diag.fps.toFixed(1)}  Frame: ${diag.serverFrame}
${kbps}kbps  ${diag.bytesPerFrame}B  ${fi}ms/f

-- Server --
Copy: ${srvCopy}ms  Encode: ${srvEnc}ms
Pipeline: ${srvPipe}ms (capture>send)

-- Client --
Decode: ${dec}ms  Jitter: ${jit}ms
Drops: ${diag.droppedFrames}

-- P1 --
Rate: ${p1.pps||0}/s  Chg: ${p1.cps||0}/s
Btn: 0x${(p1.btn||0xFFFF).toString(16).padStart(4,'0')}
E2E: ~${(parseFloat(srvPipe) + ((p1.pps||0) > 1000 ? 0.3 : 1.0) + parseFloat(dec)).toFixed(1)}ms ${(p1.pps||0) > 1000 ? '(HW)' : '(web)'}

-- P2 --
Rate: ${p2.pps||0}/s  Chg: ${p2.cps||0}/s
Btn: 0x${(p2.btn||0xFFFF).toString(16).padStart(4,'0')}
E2E: ~${(parseFloat(srvPipe) + ((p2.pps||0) > 1000 ? 0.3 : 1.0) + parseFloat(dec)).toFixed(1)}ms ${(p2.pps||0) > 1000 ? '(HW)' : '(web)'}

-- Me --
Slot: ${mySlot >= 0 ? 'P'+(mySlot+1) : 'spectator'}
Pad: ${diag.gamepadActive ? 'YES' : 'no'}  Sent: ${diag.inputSendCount}`;
}

function initDecoder() {
  decoder = new VideoDecoder({
    output: (frame) => {
      const decEnd = performance.now();
      diag.decodeSamples.push(decEnd - diag.decodeStartMs);
      if (diag.decodeSamples.length > 60) diag.decodeSamples.shift();
      ctx.drawImage(frame, 0, 0, canvas.width, canvas.height);
      frame.close();
      frameCount++;
      if (frameCount % 30 === 0) {
        diag.fps = frameCount / ((performance.now() - startTime) / 1000);
        updateDiag();
      }
    },
    error: (e) => { console.error('Decoder error:', e); }
  });
  decoder.configure({
    codec: 'avc1.42001e',
    codedWidth: 640, codedHeight: 480,
    optimizeForLatency: true,
    hardwareAcceleration: "prefer-hardware",
  });
}

let lastFrameTime = 0;

function connect() {
  if (ws) { ws.close(); if (gamepadInterval) clearInterval(gamepadInterval); }

  // Connect directly to Flycast WebSocket — NO PROXY
  const wsHost = window.location.hostname || '127.0.0.1';
  const url = `ws://${wsHost}:7200`;
  statusEl.textContent = 'Connecting...';

  ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    statusEl.textContent = 'Connected - watching';
    frameCount = 0;
    startTime = performance.now();
    lastFrameTime = 0;
    initDecoder();
    joinBtn.disabled = false;
  };

  ws.onmessage = (event) => {
    if (typeof event.data === 'string') {
      // JSON control message
      try {
        const msg = JSON.parse(event.data);
        if (msg.type === 'assigned') {
          mySlot = msg.slot;
          if (mySlot >= 0) {
            statusEl.textContent = `You are P${mySlot + 1} - FIGHT!`;
            joinBtn.textContent = `Playing as P${mySlot + 1}`;
            joinBtn.disabled = true;
            startGamepadPolling();
          } else {
            statusEl.textContent = 'Game full - watching';
          }
        }
        if (msg.type === 'status') {
          updateLobby(msg);
        }
      } catch (e) {}
      return;
    }

    // Check if this is game state (starts with "GS") or video frame
    const rawBuf = new Uint8Array(event.data);
    if (rawBuf.length > 4 && rawBuf[0] === 0x47 && rawBuf[1] === 0x53) {
      // Game state packet — parse MVC2 state
      parseGameState(rawBuf);
      return;
    }

    // Video frame
    if (!decoder || decoder.state === 'closed') return;
    const now = performance.now();
    if (lastFrameTime > 0) {
      diag.frameIntervals.push(now - lastFrameTime);
      if (diag.frameIntervals.length > 60) diag.frameIntervals.shift();
    }
    lastFrameTime = now;

    const buf = new Uint8Array(event.data);
    // Header: [pipelineUs(4)][copyUs(4)][encodeUs(4)][frameNum(4)] + p1(8) + p2(8) = 32 bytes
    if (buf.length < 32) return;
    const view = new DataView(event.data);

    const pipelineUs = view.getUint32(0, true);   // total capture+encode
    const copyUs = view.getUint32(4, true);        // GPU copy
    const encodeUs = view.getUint32(8, true);      // NVENC encode
    diag.serverFrame = view.getUint32(12, true);
    diag.p1 = { pps: view.getUint16(16,true), cps: view.getUint16(18,true), btn: view.getUint16(20,true), lt: buf[22], rt: buf[23] };
    diag.p2 = { pps: view.getUint16(24,true), cps: view.getUint16(26,true), btn: view.getUint16(28,true), lt: buf[30], rt: buf[31] };
    const h264 = buf.slice(32);

    diag.bytesPerFrame = h264.length;
    diag.totalBytes += h264.length;

    // Server pipeline — pre-computed uint32, no 64-bit precision issues
    diag.serverPipelineSamples.push(pipelineUs);
    diag.serverEncodeSamples.push(encodeUs);
    diag.serverCopySamples.push(copyUs);
    if (diag.serverPipelineSamples.length > 60) diag.serverPipelineSamples.shift();
    if (diag.serverEncodeSamples.length > 60) diag.serverEncodeSamples.shift();
    if (diag.serverCopySamples.length > 60) diag.serverCopySamples.shift();

    // Jitter = deviation from perfect 16.67ms frame interval
    if (diag.prevRecvMs > 0) {
      const jit = Math.abs((now - diag.prevRecvMs) - 16.667);
      diag.jitterSamples.push(jit);
      if (diag.jitterSamples.length > 60) diag.jitterSamples.shift();
    }
    diag.prevRecvMs = now;

    diag.decodeStartMs = performance.now();
    try {
      // Detect JPEG (starts with FF D8) vs H.264
      if (h264.length > 2 && h264[0] === 0xFF && h264[1] === 0xD8) {
        // JPEG frame — decode with createImageBitmap
        const blob = new Blob([h264], {type: 'image/jpeg'});
        createImageBitmap(blob).then(bmp => {
          ctx.drawImage(bmp, 0, 0, canvas.width, canvas.height);
          bmp.close();
          const decEnd = performance.now();
          diag.decodeSamples.push(decEnd - diag.decodeStartMs);
          if (diag.decodeSamples.length > 60) diag.decodeSamples.shift();
          frameCount++;
          if (frameCount % 30 === 0) {
            diag.fps = frameCount / ((performance.now() - startTime) / 1000);
            updateDiag();
          }
        });
      } else {
        // H.264 frame — decode with WebCodecs
        decoder.decode(new EncodedVideoChunk({ type: 'key', timestamp: diag.serverFrame * 16667, data: h264 }));
      }
    } catch (e) { diag.droppedFrames++; }
  };

  ws.onclose = () => {
    statusEl.textContent = 'Disconnected';
    joinBtn.disabled = false;
    joinBtn.textContent = 'Press START to Join';
    mySlot = -1;
    if (gamepadInterval) clearInterval(gamepadInterval);
  };
  ws.onerror = () => { statusEl.textContent = 'Connection error'; };
}

function joinGame() {
  if (!ws || ws.readyState !== WebSocket.OPEN) { connect(); return; }
  myName = nameInput.value.trim() || 'Player';
  localStorage.setItem('maplecast_name', myName);

  // Detect gamepad name
  let device = 'Browser';
  const gp = navigator.getGamepads()[0];
  if (gp) device = gp.id.substring(0, 30);

  ws.send(JSON.stringify({type:'join', id:myId, name:myName, device: device}));
  joinBtn.textContent = 'Joining...';
  joinBtn.disabled = true;
}

function updateLobby(msg) {
  let html = '';
  for (const [slot, label, statsKey] of [['p1','P1','p1'], ['p2','P2','p2']]) {
    const p = msg[slot];
    const s = diag[statsKey] || {};
    if (p && p.connected) {
      const isMe = p.id === myId.substring(0,8);
      const isHw = p.type === 'hardware';
      const cls = isMe ? 'me' : 'taken';
      const deviceTag = isHw ? 'NOBD Stick' : (p.device || 'Browser');
      const rate = s.pps || 0;
      html += `<span class="slot ${cls}">` +
        `<b>${label}: ${p.name}</b>${isMe ? ' (you)' : ''}<br>` +
        `<small>${deviceTag} | ${rate}/s</small>` +
        `</span> `;
    } else {
      html += `<span class="slot empty">${label}: open</span> `;
    }
  }
  lobbyEl.innerHTML = html;
}

function startGamepadPolling() {
  if (gamepadInterval) clearInterval(gamepadInterval);
  let prevW3 = null;
  gamepadInterval = setInterval(() => {
    if (!ws || ws.readyState !== WebSocket.OPEN || mySlot < 0) return;
    const gp = navigator.getGamepads()[0];
    if (!gp) { diag.gamepadActive = false; return; }
    diag.gamepadActive = true;

    let btn = 0xFFFF;
    if (gp.buttons[0]?.pressed) btn &= ~0x0004;
    if (gp.buttons[1]?.pressed) btn &= ~0x0002;
    if (gp.buttons[2]?.pressed) btn &= ~0x0400;
    if (gp.buttons[3]?.pressed) btn &= ~0x0200;
    if (gp.buttons[9]?.pressed) btn &= ~0x0008;
    if (gp.buttons[12]?.pressed) btn &= ~0x0010;
    if (gp.buttons[13]?.pressed) btn &= ~0x0020;
    if (gp.buttons[14]?.pressed) btn &= ~0x0040;
    if (gp.buttons[15]?.pressed) btn &= ~0x0080;
    const lt = Math.floor((gp.buttons[6]?.value||0)*255);
    const rt = Math.floor((gp.buttons[7]?.value||0)*255);

    const w3 = new Uint8Array([lt, rt, (btn>>8)&0xFF, btn&0xFF]);
    // Always send — server drains and keeps latest
    ws.send(w3);
    diag.inputSendCount++;
  }, 4); // 250Hz polling
}

// Waiting screen
ctx.fillStyle = '#111';
ctx.fillRect(0, 0, 640, 480);
ctx.fillStyle = '#0f0';
ctx.font = '24px monospace';
ctx.textAlign = 'center';
ctx.fillText('MapleCast', 320, 200);
ctx.font = '14px monospace';
ctx.fillText('MVC2 Online', 320, 230);
ctx.font = '12px monospace';
ctx.fillStyle = '#888';
ctx.fillText('Enter your name and press START to join', 320, 280);

diagEl.textContent = '=== MapleCast ===\nWaiting...';

// MVC2 Character names
const MVC2_CHARS = [
  'Ryu','Zangief','Guile','Morrigan','Anakaris','Strider','Cyclops','Wolverine',
  'Psylocke','Iceman','Rogue','Cap America','Spider-Man','Hulk','Venom','Dr Doom',
  'Tron Bonne','Jill','Hayato','Ruby Heart','SonSon','Amingo','Marrow','Cable',
  'Abyss1','Abyss2','Abyss3','Chun-Li','Mega Man','Roll','Akuma','BB Hood',
  'Felicia','Charlie','Sakura','Dan','Cammy','Dhalsim','M Bison','Ken',
  'Gambit','Juggernaut','Storm','Sabretooth','Magneto','Shuma','War Machine',
  'Silver Samurai','Omega Red','Spiral','Colossus','Iron Man','Sentinel',
  'Blackheart','Thanos','Jin','Cap Commando','Bone Wolverine','Servbot'
];

// Game state storage
let gameState = null;

function parseGameState(buf) {
  // Wire format: [G][S][size_u16][serialized data]
  // Serialized layout (no padding, field-by-field):
  //   Global: in_match(1) timer(1) stage(1) p1_lvl(1) p2_lvl(1) = 5 bytes
  //   p1_combo(2) p2_combo(2) p1_fill(2) p2_fill(2) camera_x(4) camera_y(4) frame(4) = 20 bytes
  //   6 chars × 38 bytes = 228 bytes
  //   Total: 253 bytes
  const view = new DataView(buf.buffer, buf.byteOffset);
  const size = view.getUint16(2, true);
  if (buf.length < 4 + size) return;

  const o = 4; // skip GS header
  gameState = {
    in_match:       buf[o + 0],
    timer:          buf[o + 1],
    stage_id:       buf[o + 2],
    p1_meter_level: buf[o + 3],
    p2_meter_level: buf[o + 4],
    p1_combo:       view.getUint16(o + 5, true),
    p2_combo:       view.getUint16(o + 7, true),
    p1_meter_fill:  view.getUint16(o + 9, true),
    p2_meter_fill:  view.getUint16(o + 11, true),
    camera_x:       view.getFloat32(o + 13, true),
    camera_y:       view.getFloat32(o + 17, true),
    frame:          view.getUint32(o + 21, true),
    chars: []
  };
  const charBase = o + 25; // global header is 25 bytes

  // 6 characters × 38 bytes each
  for (let i = 0; i < 6; i++) {
    const co = charBase + i * 38;
    gameState.chars.push({
      active:       buf[co + 0],
      id:           buf[co + 1],
      name:         MVC2_CHARS[buf[co + 1]] || '?',
      facing:       buf[co + 2],
      health:       buf[co + 3],
      red_health:   buf[co + 4],
      special_move: buf[co + 5],
      assist_type:  buf[co + 6],
      palette_id:   buf[co + 7],
      pos_x:        view.getFloat32(co + 8, true),
      pos_y:        view.getFloat32(co + 12, true),
      screen_x:     view.getFloat32(co + 16, true),
      screen_y:     view.getFloat32(co + 20, true),
      vel_x:        view.getFloat32(co + 24, true),
      vel_y:        view.getFloat32(co + 28, true),
      sprite_id:    view.getUint16(co + 32, true),
      anim_state:   view.getUint16(co + 34, true),
      anim_timer:   view.getUint16(co + 36, true),
    });
  }

  // In headless mode, render game state to canvas as visual debug
  renderGameState();
}

// Stage colors
const STAGE_COLORS = [
  '#1a2a4a','#c4a050','#3a3a3a','#8a2050','#2a4a2a','#4a3020',
  '#2a2040','#204a6a','#401020','#1a2a4a','#c4a050','#222',
  '#8a2050','#2a4a2a','#4a3020','#2a2040','#204a6a'
];

// Character colors (P1 side = blue/cyan tones, P2 side = red/magenta tones)
const P1_COLOR = '#00ccff';
const P2_COLOR = '#ff44aa';

function renderGameState() {
  if (!gameState) return;

  // Stage background
  const stageBg = STAGE_COLORS[gameState.stage_id] || '#111';
  ctx.fillStyle = stageBg;
  ctx.fillRect(0, 0, 640, 480);

  // Ground line
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, 380);
  ctx.lineTo(640, 380);
  ctx.stroke();

  // Draw active characters as rectangles at their positions
  for (let i = 0; i < 6; i++) {
    const c = gameState.chars[i];
    if (!c || !c.active) continue;

    const isP1 = (i % 2 === 0);
    const color = isP1 ? P1_COLOR : P2_COLOR;
    const name = c.name || MVC2_CHARS[c.id] || '?';

    // Map arena position to screen
    // Arena X is roughly -1200 to +1200, map to 0-640
    // Arena Y is 0 (ground) to ~500 (air), map to 380 (ground) to 80 (top)
    const camX = gameState.camera_x || 0;
    const sx = 320 + (c.pos_x - camX) * 0.25;
    const sy = 380 - (c.pos_y || 0) * 0.3;

    // Character body (rectangle)
    const charW = 40;
    const charH = 80;
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.8;
    ctx.fillRect(sx - charW/2, sy - charH, charW, charH);
    ctx.globalAlpha = 1.0;

    // Facing indicator (small triangle)
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    if (c.facing) {
      ctx.moveTo(sx + charW/2, sy - charH/2);
      ctx.lineTo(sx + charW/2 + 8, sy - charH/2 + 5);
      ctx.lineTo(sx + charW/2, sy - charH/2 + 10);
    } else {
      ctx.moveTo(sx - charW/2, sy - charH/2);
      ctx.lineTo(sx - charW/2 - 8, sy - charH/2 + 5);
      ctx.lineTo(sx - charW/2, sy - charH/2 + 10);
    }
    ctx.fill();

    // Character name
    ctx.fillStyle = '#fff';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(name, sx, sy - charH - 5);

    // Health bar above character
    const hpMax = 144;
    const hpPct = Math.max(0, (c.health || 0) / hpMax);
    const redPct = Math.max(0, (c.red_health || 0) / hpMax);
    const barW = 50;
    const barH = 4;
    const barY = sy - charH - 15;
    // Background
    ctx.fillStyle = '#333';
    ctx.fillRect(sx - barW/2, barY, barW, barH);
    // Red health
    ctx.fillStyle = '#a00';
    ctx.fillRect(sx - barW/2, barY, barW * redPct, barH);
    // Current health
    ctx.fillStyle = hpPct > 0.3 ? '#0f0' : (hpPct > 0.1 ? '#ff0' : '#f00');
    ctx.fillRect(sx - barW/2, barY, barW * hpPct, barH);

    // Animation info
    ctx.fillStyle = '#888';
    ctx.font = '8px monospace';
    ctx.fillText(`S:${c.sprite_id} A:${c.anim_state}`, sx, sy + 12);
  }

  // HUD - Timer
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(gameState.timer.toString(), 320, 35);

  // HUD - Meters
  for (let p = 0; p < 2; p++) {
    const level = p === 0 ? gameState.p1_meter_level : gameState.p2_meter_level;
    const fill = p === 0 ? gameState.p1_meter_fill : gameState.p2_meter_fill;
    const baseX = p === 0 ? 20 : 400;
    const color = p === 0 ? P1_COLOR : P2_COLOR;

    // Meter bars
    for (let b = 0; b < 5; b++) {
      ctx.fillStyle = b < level ? color : '#333';
      ctx.fillRect(baseX + b * 44, 455, 40, 8);
    }
    // Fill of current bar
    if (level < 5) {
      ctx.fillStyle = color;
      ctx.globalAlpha = 0.5;
      ctx.fillRect(baseX + level * 44, 455, (fill / 65535) * 40, 8);
      ctx.globalAlpha = 1.0;
    }
  }

  // HUD - Combo counters
  if (gameState.p1_combo > 1) {
    ctx.fillStyle = P1_COLOR;
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`${gameState.p1_combo} HIT!`, 20, 430);
  }
  if (gameState.p2_combo > 1) {
    ctx.fillStyle = P2_COLOR;
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(`${gameState.p2_combo} HIT!`, 620, 430);
  }

  // Team display (top corners)
  ctx.font = '9px monospace';
  for (let i = 0; i < 6; i++) {
    const c = gameState.chars[i];
    if (!c) continue;
    const isP1 = (i % 2 === 0);
    const slot = Math.floor(i / 2);  // 0=point, 1=assist1, 2=assist2
    const name = c.name || MVC2_CHARS[c.id] || '?';
    const x = isP1 ? 10 : 540;
    const y = 55 + slot * 14;
    ctx.fillStyle = c.active ? '#fff' : '#555';
    ctx.textAlign = 'left';
    ctx.fillText(`${slot === 0 ? '>' : ' '} ${name} HP:${c.health || 0}`, x, y);
  }

  // Frame counter + mode label
  ctx.fillStyle = '#0f04';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`GAMESTATE RENDER | F:${gameState.frame} | 296 bytes/frame | 0ms encode`, 320, 478);
}

let sizeof_gs = 0;

// Auto-connect on page load
connect();
</script>
</body>
</html>
