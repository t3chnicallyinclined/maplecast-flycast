<!DOCTYPE html>
<html>
<head>
<title>MapleCast - MVC2 Online</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; color: #0f0; }
canvas { image-rendering: pixelated; border: 2px solid #333; }
#status { margin: 10px; font-size: 16px; text-align: center; }
#lobby { margin: 10px; font-size: 13px; color: #888; }
#controls { margin: 10px; }
#diag { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.9); color: #0f0; font-size: 10px; padding: 8px; border: 1px solid #333; font-family: monospace; white-space: pre; min-width: 260px; }
button { background: #222; color: #0f0; border: 1px solid #0f0; padding: 10px 20px; margin: 5px; cursor: pointer; font-family: monospace; font-size: 14px; }
button:hover { background: #0f0; color: #000; }
button:disabled { opacity: 0.3; cursor: not-allowed; }
input { background: #111; color: #0f0; border: 1px solid #333; padding: 8px; font-family: monospace; font-size: 14px; width: 200px; text-align: center; }
.slot { display: inline-block; padding: 5px 10px; margin: 3px; border: 1px solid #333; min-width: 180px; text-align: center; line-height: 1.4; }
.slot.taken { border-color: #0f0; color: #0f0; }
.slot.me { border-color: #ff0; color: #ff0; }
.slot.empty { border-color: #333; color: #555; }
</style>
</head>
<body>
<div id="status">MapleCast - MVC2</div>
<div id="game" style="width:640px;height:480px;"></div>
<canvas id="screen" width="1" height="1" style="display:none;"></canvas>
<div id="lobby"></div>
<div id="controls">
  <input id="nameInput" placeholder="Your name" maxlength="16" />
  <button id="joinBtn" onclick="joinGame()">Press START to Join</button>
</div>
<div id="diag"></div>

<!-- EmulatorJS WASM Mirror -->
<script>
  EJS_player = '#game';
  EJS_core = 'flycast';
  EJS_gameUrl = 'roms/mvc2.chd';
  EJS_pathtodata = 'ejs-data/';
  EJS_biosUrl = 'bios/dc_boot.bin';
  EJS_startOnLoaded = true;
  EJS_color = '#0f0';
  EJS_disableLocalStorage = true;
  EJS_defaultOptions = {
    'reicast_hle_bios': 'enabled',
    'reicast_threaded_rendering': 'enabled',
    'reicast_enable_rttb': 'enabled',
    'reicast_mipmapping': 'disabled',
    'reicast_fog': 'disabled',
    'reicast_volume_modifier_enable': 'disabled',
    'reicast_frame_skipping': '0',
    'reicast_enable_dsp': 'disabled',
    'reicast_force_freeplay': 'enabled',
    'reicast_alpha_sorting': 'per-strip (fast, least accurate)',
    'reicast_oit_layers': '4',
  };

  var MIRROR_SERVER = 'ws://' + location.hostname + ':7200';

  EJS_onGameStart = function() {
    console.log('[mirror] Game started, connecting mirror...');
    var emu = window.EJS_emulator;
    var Module = emu.Module;
    if (typeof Module._mirror_init !== 'function') { console.error('[mirror] _mirror_init not found'); return; }
    Module._mirror_init();
    console.log('[mirror] Mirror initialized');

    var bufSize = 256 * 1024;
    var buf = Module._malloc(bufSize);
    var frames = 0, startTime = 0;

    var ws = new WebSocket(MIRROR_SERVER);
    ws.binaryType = 'arraybuffer';
    ws.onopen = function() {
      document.getElementById('status').textContent = 'MapleCast - LIVE';
      startTime = performance.now();
    };
    ws.onclose = function() {
      document.getElementById('status').textContent = 'MapleCast - Reconnecting...';
    };
    ws.onmessage = function(e) {
      if (typeof e.data === 'string') return;
      var data = new Uint8Array(e.data);
      if (data.length < 80) return;
      if (data[0]===0x53 && data[1]===0x59 && data[2]===0x4E && data[3]===0x43) {
        if (data.length > bufSize) { Module._free(buf); bufSize = data.length + 65536; buf = Module._malloc(bufSize); }
        Module.writeArrayToMemory(data, buf);
        if (Module._mirror_apply_sync) Module._mirror_apply_sync(buf, data.length);
        return;
      }
      if (data.length > bufSize) { Module._free(buf); bufSize = data.length + 65536; buf = Module._malloc(bufSize); }
      Module.writeArrayToMemory(data, buf);
      Module._mirror_render_frame(buf, data.length);
      frames++;
      if (frames % 300 === 0) {
        var fps = frames / ((performance.now() - startTime) / 1000);
        document.getElementById('status').textContent = 'MapleCast - LIVE | ' + fps.toFixed(0) + ' fps';
      }
    };
  };
</script>
<script src="ejs-data/loader.js"></script>

<script>

const nameInput = document.getElementById('nameInput');

let ws = null;
let decoder = null;
let frameCount = 0;
let startTime = 0;
let gamepadInterval = null;
let mySlot = -1;

// WebRTC P2P DataChannel
let pc = null;
let videoDc = null;
let inputDc = null;

// Audio streaming state
let audioCtx = null;

let audioChunksReceived = 0;
let audioUnderruns = 0;

if (!myId) { myId = crypto.randomUUID(); localStorage.setItem('maplecast_id', myId); }
let myName = localStorage.getItem('maplecast_name') || '';
nameInput.value = myName;

const diag = {
  fps: 0, serverFrame: 0, bytesPerFrame: 0, totalBytes: 0,
  decodeSamples: [], serverPipelineSamples: [], serverEncodeSamples: [],
  serverCopySamples: [], jitterSamples: [],
  prevRecvMs: 0,
  droppedFrames: 0, gamepadActive: false, inputSendCount: 0,
  frameIntervals: [], p1: {}, p2: {},
  decodeStartMs: 0,
};

function avg(arr) { return arr.length > 0 ? arr.reduce((a,b) => a+b, 0) / arr.length : 0; }

function updateDiag() {
  const kbps = startTime > 0 ? (diag.totalBytes * 8 / 1000 / ((performance.now() - startTime) / 1000)).toFixed(0) : '0';
  const p1 = diag.p1 || {};
  const p2 = diag.p2 || {};
  const srvPipe = (avg(diag.serverPipelineSamples) / 1000).toFixed(2);
  const srvEnc = (avg(diag.serverEncodeSamples) / 1000).toFixed(2);
  const srvCopy = (avg(diag.serverCopySamples) / 1000).toFixed(2);
  const dec = avg(diag.decodeSamples).toFixed(2);
  const jit = avg(diag.jitterSamples).toFixed(2);
  const fi = avg(diag.frameIntervals).toFixed(1);

  diagEl.textContent =
`=== MapleCast ===
FPS: ${diag.fps.toFixed(1)}  Frame: ${diag.serverFrame}
${kbps}kbps  ${diag.bytesPerFrame}B  ${fi}ms/f

-- Server --
Copy: ${srvCopy}ms  Encode: ${srvEnc}ms
Pipeline: ${srvPipe}ms (capture>send)

-- Client --
Decode: ${dec}ms  Jitter: ${jit}ms
Drops: ${diag.droppedFrames}

-- P1 --
Rate: ${p1.pps||0}/s  Chg: ${p1.cps||0}/s
Btn: 0x${(p1.btn||0xFFFF).toString(16).padStart(4,'0')}
E2E: ~${(parseFloat(srvPipe) + ((p1.pps||0) > 1000 ? 0.3 : 1.0) + parseFloat(dec)).toFixed(1)}ms ${(p1.pps||0) > 1000 ? '(HW)' : '(web)'}

-- P2 --
Rate: ${p2.pps||0}/s  Chg: ${p2.cps||0}/s
Btn: 0x${(p2.btn||0xFFFF).toString(16).padStart(4,'0')}
E2E: ~${(parseFloat(srvPipe) + ((p2.pps||0) > 1000 ? 0.3 : 1.0) + parseFloat(dec)).toFixed(1)}ms ${(p2.pps||0) > 1000 ? '(HW)' : '(web)'}

-- Me --
Slot: ${mySlot >= 0 ? 'P'+(mySlot+1) : 'spectator'}
Pad: ${diag.gamepadActive ? 'YES' : 'no'}  Sent: ${diag.inputSendCount}

-- Audio --
Chunks: ${typeof audioChunksReceived !== 'undefined' ? audioChunksReceived : 0}
Queue: ${typeof audioQueue !== 'undefined' ? audioQueue.length : 0}
Underruns: ${typeof audioUnderruns !== 'undefined' ? audioUnderruns : 0}
State: ${typeof audioCtx !== 'undefined' && audioCtx ? audioCtx.state : 'off'}`;
}

function initDecoder() {
  // H.264 decoder disabled — WASM mirror handles rendering
}

let lastFrameTime = 0;

function connect() {
  if (ws) { ws.close(); if (gamepadInterval) clearInterval(gamepadInterval); }

  // Connect to WebSocket signaling — auto-detect local vs tunnel
  let url;
  const params = new URLSearchParams(window.location.search);
  const wsOverride = params.get('ws');  // ?ws=wss://tunnel-url.trycloudflare.com
  if (wsOverride) {
    url = wsOverride;
  } else if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
    url = `ws://${window.location.hostname}:7200`;
  } else {
    // On a tunnel/remote domain — assume signaling is on same origin
    const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    url = `${proto}//${window.location.host}`;
  }
  statusEl.textContent = 'Connecting to ' + url + '...';

  ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    statusEl.textContent = 'Connected - watching';
    frameCount = 0;
    startTime = performance.now();
    lastFrameTime = 0;
    joinBtn.disabled = false;
  };

  ws.onmessage = (event) => {
    if (typeof event.data === 'string') {
      try {
        const msg = JSON.parse(event.data);
        if (msg.type === 'assigned') {
          mySlot = msg.slot;
          if (mySlot >= 0) {
            statusEl.textContent = `You are P${mySlot + 1} - FIGHT!`;
            joinBtn.textContent = `Playing as P${mySlot + 1}`;
            joinBtn.disabled = true;
            startGamepadPolling();
          } else {
            statusEl.textContent = 'Game full - watching';
          }
        }
        if (msg.type === 'status') {
          updateLobby(msg);
        }
        // WebRTC removed — using WASM mirror for rendering
      } catch (e) {}
      return;
    }

    // Binary frames handled by WASM mirror, not here
  };

  ws.onclose = () => {
    statusEl.textContent = 'Disconnected';
    joinBtn.disabled = false;
    joinBtn.textContent = 'Press START to Join';
    mySlot = -1;
    if (gamepadInterval) clearInterval(gamepadInterval);
  };
  ws.onerror = () => { statusEl.textContent = 'Connection error'; };
}

// ============================================================
// WebRTC DataChannel — P2P NAT hole-punching
// ============================================================
function setupWebRTC() {
  if (pc) { pc.close(); pc = null; }
  useDataChannel = false;

  const config = {
    iceServers: [
      { urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302'] }
    ]
  };
  pc = new RTCPeerConnection(config);

  // Create DataChannels (browser creates, server accepts via onDataChannel)
  videoDc = pc.createDataChannel('video', { ordered: false, maxRetransmits: 0 });
  inputDc = pc.createDataChannel('input', { ordered: false, maxRetransmits: 0 });
  const audioDc = pc.createDataChannel('audio', { ordered: true, maxRetransmits: 0 });
  videoDc.binaryType = 'arraybuffer';
  inputDc.binaryType = 'arraybuffer';
  audioDc.binaryType = 'arraybuffer';

  const checkReady = () => {
    if (videoDc.readyState === 'open' && inputDc.readyState === 'open') {
      useDataChannel = true;
      console.log('[rtc] P2P DataChannels open — NAT hole-punched');
      statusEl.textContent += ' [P2P]';
    }
  };

  videoDc.onopen = checkReady;
  inputDc.onopen = checkReady;
  videoDc.onclose = () => { useDataChannel = false; console.log('[rtc] video DC closed'); };
  inputDc.onclose = () => { useDataChannel = false; console.log('[rtc] input DC closed'); };

  // Video frames via DataChannel
  videoDc.onmessage = (event) => handleVideoFrame(event.data);

  // Audio playback — raw PCM via ScriptProcessor
  audioDc.onopen = async () => {
    console.log('[rtc] audio DC open — starting PCM playback via AudioWorklet');
    try {
      audioCtx = new AudioContext({ sampleRate: 48000 });
      // Browser autoplay policy: resume on user interaction
      if (audioCtx.state === 'suspended') {
        console.log('[rtc] AudioContext suspended — click page to enable audio');
        const resume = () => {
          audioCtx.resume().then(() => console.log('[rtc] AudioContext resumed'));
          document.removeEventListener('click', resume);
          document.removeEventListener('keydown', resume);
        };
        document.addEventListener('click', resume);
        document.addEventListener('keydown', resume);
      }
      // AudioWorklet runs on dedicated audio thread — never interrupted by main thread
      await audioCtx.audioWorklet.addModule('pcm-worklet.js');
      const workletNode = new AudioWorkletNode(audioCtx, 'pcm-processor', {
        outputChannelCount: [2]
      });
      workletNode.connect(audioCtx.destination);
      window._audioWorkletPort = workletNode.port;
      console.log('[rtc] AudioWorklet ready — sampleRate:', audioCtx.sampleRate, 'baseLatency:', audioCtx.baseLatency);
    } catch (e) {
      console.error('[rtc] AudioWorklet failed:', e);
    }
  };
  audioDc.onmessage = (event) => {
    const buf = new Uint8Array(event.data);
    // Header: [0xAD][0x10][seqHi][seqLo][pcm_data...]
    if (buf.length < 8 || buf[0] !== 0xAD || buf[1] !== 0x10) return;
    const pcm = new Int16Array(event.data, 4);
    audioChunksReceived++;
    // Send to AudioWorklet thread (zero main-thread processing)
    if (window._audioWorkletPort) {
      window._audioWorkletPort.postMessage(pcm);
    }
  };
  audioDc.onclose = () => {
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
    console.log('[rtc] audio DC closed');
  };

  // ICE candidates → send to server via WebSocket
  pc.onicecandidate = (event) => {
    if (event.candidate && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({
        type: 'ice-candidate',
        id: myId,
        candidate: event.candidate.candidate,
        sdpMid: event.candidate.sdpMid

    }
  };

  pc.onconnectionstatechange = () => {
    console.log('[rtc] connection state:', pc.connectionState);
    if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
      useDataChannel = false;
      console.log('[rtc] P2P failed — falling back to WebSocket');
    }
  };

  // Create offer → send to server via WebSocket
  pc.createOffer().then(offer => {
    return pc.setLocalDescription(offer);
  }).then(() => {
    ws.send(JSON.stringify({
      type: 'offer',
      id: myId,
      sdp: pc.localDescription.sdp
    }));
    console.log('[rtc] SDP offer sent');
  }).catch(err => {
    console.error('[rtc] offer failed:', err);
  });

  // Fallback: if DataChannels don't open in 5s, stay on WebSocket
  setTimeout(() => {
    if (!useDataChannel) {
      console.log('[rtc] DataChannel timeout — using WebSocket');
    }
  }, 5000);
}
*/

function joinGame() {
  if (!ws || ws.readyState !== WebSocket.OPEN) { connect(); return; }
  myName = nameInput.value.trim() || 'Player';
  localStorage.setItem('maplecast_name', myName);

  // Detect gamepad name
  let device = 'Browser';
  const gp = navigator.getGamepads()[0];
  if (gp) device = gp.id.substring(0, 30);

  ws.send(JSON.stringify({type:'join', id:myId, name:myName, device: device}));
  joinBtn.textContent = 'Joining...';
  joinBtn.disabled = true;
}

function updateLobby(msg) {
  let html = '';
  for (const [slot, label, statsKey] of [['p1','P1','p1'], ['p2','P2','p2']]) {
    const p = msg[slot];
    const s = diag[statsKey] || {};
    if (p && p.connected) {
      const isMe = p.id === myId.substring(0,8);
      const isHw = p.type === 'hardware';
      const cls = isMe ? 'me' : 'taken';
      const deviceTag = isHw ? 'NOBD Stick' : (p.device || 'Browser');
      const rate = s.pps || 0;
      html += `<span class="slot ${cls}">` +
        `<b>${label}: ${p.name}</b>${isMe ? ' (you)' : ''}<br>` +
        `<small>${deviceTag} | ${rate}/s</small>` +
        `</span> `;
    } else {
      html += `<span class="slot empty">${label}: open</span> `;
    }
  }
  lobbyEl.innerHTML = html;
}

function startGamepadPolling() {
  if (gamepadInterval) clearInterval(gamepadInterval);
  let prevW3 = null;
  gamepadInterval = setInterval(() => {
    if (!ws || ws.readyState !== WebSocket.OPEN || mySlot < 0) return;
    const gp = navigator.getGamepads()[0];
    if (!gp) { diag.gamepadActive = false; return; }
    diag.gamepadActive = true;

    let btn = 0xFFFF;
    if (gp.buttons[0]?.pressed) btn &= ~0x0004;
    if (gp.buttons[1]?.pressed) btn &= ~0x0002;
    if (gp.buttons[2]?.pressed) btn &= ~0x0400;
    if (gp.buttons[3]?.pressed) btn &= ~0x0200;
    if (gp.buttons[9]?.pressed) btn &= ~0x0008;
    if (gp.buttons[12]?.pressed) btn &= ~0x0010;
    if (gp.buttons[13]?.pressed) btn &= ~0x0020;
    if (gp.buttons[14]?.pressed) btn &= ~0x0040;
    if (gp.buttons[15]?.pressed) btn &= ~0x0080;
    const lt = Math.floor((gp.buttons[6]?.value||0)*255);
    const rt = Math.floor((gp.buttons[7]?.value||0)*255);

    const w3 = new Uint8Array([lt, rt, (btn>>8)&0xFF, btn&0xFF]);
    // Send gamepad input via WebSocket
    ws.send(w3);
    diag.inputSendCount++;
  }, 4); // 250Hz polling
}

diagEl.textContent = '=== MapleCast ===\nWaiting...';

// Connect for lobby/join only — WASM mirror handles video
connect();
</script>
</body>
