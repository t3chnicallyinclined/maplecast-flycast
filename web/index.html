<!DOCTYPE html>
<html>
<head>
<title>MapleCast - MVC2 Online</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; color: #0f0; }
canvas { image-rendering: pixelated; border: 2px solid #333; }
#status { margin: 10px; font-size: 16px; text-align: center; }
#lobby { margin: 10px; font-size: 13px; color: #888; }
#controls { margin: 10px; }
#diag { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.9); color: #0f0; font-size: 10px; padding: 8px; border: 1px solid #333; font-family: monospace; white-space: pre; min-width: 260px; }
button { background: #222; color: #0f0; border: 1px solid #0f0; padding: 10px 20px; margin: 5px; cursor: pointer; font-family: monospace; font-size: 14px; }
button:hover { background: #0f0; color: #000; }
button:disabled { opacity: 0.3; cursor: not-allowed; }
input { background: #111; color: #0f0; border: 1px solid #333; padding: 8px; font-family: monospace; font-size: 14px; width: 200px; text-align: center; }
.slot { display: inline-block; padding: 5px 10px; margin: 3px; border: 1px solid #333; min-width: 180px; text-align: center; line-height: 1.4; }
.slot.taken { border-color: #0f0; color: #0f0; }
.slot.me { border-color: #ff0; color: #ff0; }
.slot.empty { border-color: #333; color: #555; }
</style>
</head>
<body>
<div id="status">MapleCast - MVC2</div>
<canvas id="screen" width="640" height="480"></canvas>
<div id="lobby"></div>
<div id="controls">
  <input id="nameInput" placeholder="Your name" maxlength="16" />
  <button id="joinBtn" onclick="joinGame()">Press START to Join</button>
</div>
<div id="diag"></div>

<script>
const canvas = document.getElementById('screen');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const lobbyEl = document.getElementById('lobby');
const diagEl = document.getElementById('diag');
const joinBtn = document.getElementById('joinBtn');
const nameInput = document.getElementById('nameInput');

let ws = null;
let decoder = null;
let frameCount = 0;
let startTime = 0;
let gamepadInterval = null;
let mySlot = -1;
let myId = localStorage.getItem('maplecast_id');
if (!myId) { myId = crypto.randomUUID(); localStorage.setItem('maplecast_id', myId); }
let myName = localStorage.getItem('maplecast_name') || '';
nameInput.value = myName;

const diag = {
  fps: 0, serverFrame: 0, bytesPerFrame: 0, totalBytes: 0,
  decodeSamples: [], serverCaptureSamples: [], serverEncodeSamples: [],
  serverTotalSamples: [], jitterSamples: [],
  prevEncodeDoneUs: 0, prevClientRecvMs: 0,
  droppedFrames: 0, gamepadActive: false, inputSendCount: 0,
  frameIntervals: [], p1: {}, p2: {},
  decodeStartMs: 0,
};

function avg(arr) { return arr.length > 0 ? arr.reduce((a,b) => a+b, 0) / arr.length : 0; }

function updateDiag() {
  const kbps = startTime > 0 ? (diag.totalBytes * 8 / 1000 / ((performance.now() - startTime) / 1000)).toFixed(0) : '0';
  const p1 = diag.p1 || {};
  const p2 = diag.p2 || {};
  const srvTotal = (avg(diag.serverTotalSamples) / 1000).toFixed(2);
  const srvEnc = (avg(diag.serverEncodeSamples) / 1000).toFixed(2);
  const dec = avg(diag.decodeSamples).toFixed(2);
  const jit = avg(diag.jitterSamples).toFixed(2);
  const fi = avg(diag.frameIntervals).toFixed(1);

  diagEl.textContent =
`=== MapleCast ===
FPS: ${diag.fps.toFixed(1)}  Frame: ${diag.serverFrame}
${kbps}kbps  ${diag.bytesPerFrame}B  ${fi}ms/f

-- Server --
Encode: ${srvEnc}ms  Total: ${srvTotal}ms

-- Client --
Decode: ${dec}ms  Jitter: ${jit}ms
Drops: ${diag.droppedFrames}

-- P1 --
Rate: ${p1.pps||0}/s  Chg: ${p1.cps||0}/s
Btn: 0x${(p1.btn||0xFFFF).toString(16).padStart(4,'0')}
E2E: ~${(parseFloat(srvTotal) + ((p1.pps||0) > 1000 ? 0.3 : 2.0) + parseFloat(dec)).toFixed(1)}ms ${(p1.pps||0) > 1000 ? '(HW direct)' : '(via browser)'}

-- P2 --
Rate: ${p2.pps||0}/s  Chg: ${p2.cps||0}/s
Btn: 0x${(p2.btn||0xFFFF).toString(16).padStart(4,'0')}
E2E: ~${(parseFloat(srvTotal) + ((p2.pps||0) > 1000 ? 0.3 : 2.0) + parseFloat(dec)).toFixed(1)}ms ${(p2.pps||0) > 1000 ? '(HW direct)' : '(via browser)'}

-- Me --
Slot: ${mySlot >= 0 ? 'P'+(mySlot+1) : 'spectator'}
Pad: ${diag.gamepadActive ? 'YES' : 'no'}  Sent: ${diag.inputSendCount}`;
}

function initDecoder() {
  decoder = new VideoDecoder({
    output: (frame) => {
      const decEnd = performance.now();
      diag.decodeSamples.push(decEnd - diag.decodeStartMs);
      if (diag.decodeSamples.length > 60) diag.decodeSamples.shift();
      ctx.drawImage(frame, 0, 0, canvas.width, canvas.height);
      frame.close();
      frameCount++;
      if (frameCount % 30 === 0) {
        diag.fps = frameCount / ((performance.now() - startTime) / 1000);
        updateDiag();
      }
    },
    error: (e) => { console.error('Decoder error:', e); }
  });
  decoder.configure({
    codec: 'avc1.42001e',
    codedWidth: 640, codedHeight: 480,
    optimizeForLatency: true,
    hardwareAcceleration: "prefer-hardware",
  });
}

let lastFrameTime = 0;

function connect() {
  if (ws) { ws.close(); if (gamepadInterval) clearInterval(gamepadInterval); }

  // Connect directly to Flycast WebSocket — NO PROXY
  const wsHost = window.location.hostname || '127.0.0.1';
  const url = `ws://${wsHost}:7200`;
  statusEl.textContent = 'Connecting...';

  ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    statusEl.textContent = 'Connected - watching';
    frameCount = 0;
    startTime = performance.now();
    lastFrameTime = 0;
    initDecoder();
    joinBtn.disabled = false;
  };

  ws.onmessage = (event) => {
    if (typeof event.data === 'string') {
      // JSON control message
      try {
        const msg = JSON.parse(event.data);
        if (msg.type === 'assigned') {
          mySlot = msg.slot;
          if (mySlot >= 0) {
            statusEl.textContent = `You are P${mySlot + 1} - FIGHT!`;
            joinBtn.textContent = `Playing as P${mySlot + 1}`;
            joinBtn.disabled = true;
            startGamepadPolling();
          } else {
            statusEl.textContent = 'Game full - watching';
          }
        }
        if (msg.type === 'status') {
          updateLobby(msg);
        }
      } catch (e) {}
      return;
    }

    // Binary = video frame
    if (!decoder || decoder.state === 'closed') return;
    const now = performance.now();
    if (lastFrameTime > 0) {
      diag.frameIntervals.push(now - lastFrameTime);
      if (diag.frameIntervals.length > 60) diag.frameIntervals.shift();
    }
    lastFrameTime = now;

    const buf = new Uint8Array(event.data);
    if (buf.length < 44) return;
    const view = new DataView(event.data);
    function readI64(o) { return view.getUint32(o,true) + view.getUint32(o+4,true) * 4294967296; }

    const inputTimeUs = readI64(0);
    const captureTimeUs = readI64(8);
    const encodeDoneTimeUs = readI64(16);
    diag.serverFrame = view.getUint32(24, true);
    diag.p1 = { pps: view.getUint16(28,true), cps: view.getUint16(30,true), btn: view.getUint16(32,true), lt: buf[34], rt: buf[35] };
    diag.p2 = { pps: view.getUint16(36,true), cps: view.getUint16(38,true), btn: view.getUint16(40,true), lt: buf[42], rt: buf[43] };
    const h264 = buf.slice(44);

    diag.bytesPerFrame = h264.length;
    diag.totalBytes += h264.length;

    const srvCapUs = captureTimeUs - inputTimeUs;
    const srvEncUs = encodeDoneTimeUs - captureTimeUs;
    const srvTotUs = encodeDoneTimeUs - inputTimeUs;
    diag.serverCaptureSamples.push(srvCapUs);
    diag.serverEncodeSamples.push(srvEncUs);
    diag.serverTotalSamples.push(srvTotUs);
    if (diag.serverCaptureSamples.length > 60) diag.serverCaptureSamples.shift();
    if (diag.serverEncodeSamples.length > 60) diag.serverEncodeSamples.shift();
    if (diag.serverTotalSamples.length > 60) diag.serverTotalSamples.shift();

    if (diag.prevEncodeDoneUs > 0) {
      const jit = Math.abs((now - diag.prevClientRecvMs) - (encodeDoneTimeUs - diag.prevEncodeDoneUs) / 1000);
      diag.jitterSamples.push(jit);
      if (diag.jitterSamples.length > 60) diag.jitterSamples.shift();
    }
    diag.prevEncodeDoneUs = encodeDoneTimeUs;
    diag.prevClientRecvMs = now;

    diag.decodeStartMs = performance.now();
    try {
      decoder.decode(new EncodedVideoChunk({ type: 'key', timestamp: diag.serverFrame * 16667, data: h264 }));
    } catch (e) { diag.droppedFrames++; }
  };

  ws.onclose = () => {
    statusEl.textContent = 'Disconnected';
    joinBtn.disabled = false;
    joinBtn.textContent = 'Press START to Join';
    mySlot = -1;
    if (gamepadInterval) clearInterval(gamepadInterval);
  };
  ws.onerror = () => { statusEl.textContent = 'Connection error'; };
}

function joinGame() {
  if (!ws || ws.readyState !== WebSocket.OPEN) { connect(); return; }
  myName = nameInput.value.trim() || 'Player';
  localStorage.setItem('maplecast_name', myName);

  // Detect gamepad name
  let device = 'Browser';
  const gp = navigator.getGamepads()[0];
  if (gp) device = gp.id.substring(0, 30);

  ws.send(JSON.stringify({type:'join', id:myId, name:myName, device: device}));
  joinBtn.textContent = 'Joining...';
  joinBtn.disabled = true;
}

function updateLobby(msg) {
  let html = '';
  for (const [slot, label, statsKey] of [['p1','P1','p1'], ['p2','P2','p2']]) {
    const p = msg[slot];
    const s = diag[statsKey] || {};
    if (p && p.connected) {
      const isMe = p.id === myId.substring(0,8);
      const isHw = p.type === 'hardware';
      const cls = isMe ? 'me' : 'taken';
      const deviceTag = isHw ? 'NOBD Stick' : (p.device || 'Browser');
      const rate = s.pps || 0;
      html += `<span class="slot ${cls}">` +
        `<b>${label}: ${p.name}</b>${isMe ? ' (you)' : ''}<br>` +
        `<small>${deviceTag} | ${rate}/s</small>` +
        `</span> `;
    } else {
      html += `<span class="slot empty">${label}: open</span> `;
    }
  }
  lobbyEl.innerHTML = html;
}

function startGamepadPolling() {
  if (gamepadInterval) clearInterval(gamepadInterval);
  let prevW3 = null;
  gamepadInterval = setInterval(() => {
    if (!ws || ws.readyState !== WebSocket.OPEN || mySlot < 0) return;
    const gp = navigator.getGamepads()[0];
    if (!gp) { diag.gamepadActive = false; return; }
    diag.gamepadActive = true;

    let btn = 0xFFFF;
    if (gp.buttons[0]?.pressed) btn &= ~0x0004;
    if (gp.buttons[1]?.pressed) btn &= ~0x0002;
    if (gp.buttons[2]?.pressed) btn &= ~0x0400;
    if (gp.buttons[3]?.pressed) btn &= ~0x0200;
    if (gp.buttons[9]?.pressed) btn &= ~0x0008;
    if (gp.buttons[12]?.pressed) btn &= ~0x0010;
    if (gp.buttons[13]?.pressed) btn &= ~0x0020;
    if (gp.buttons[14]?.pressed) btn &= ~0x0040;
    if (gp.buttons[15]?.pressed) btn &= ~0x0080;
    const lt = Math.floor((gp.buttons[6]?.value||0)*255);
    const rt = Math.floor((gp.buttons[7]?.value||0)*255);

    const w3 = new Uint8Array([lt, rt, (btn>>8)&0xFF, btn&0xFF]);
    // Always send — server drains and keeps latest
    ws.send(w3);
    diag.inputSendCount++;
  }, 4); // 250Hz polling
}

// Waiting screen
ctx.fillStyle = '#111';
ctx.fillRect(0, 0, 640, 480);
ctx.fillStyle = '#0f0';
ctx.font = '24px monospace';
ctx.textAlign = 'center';
ctx.fillText('MapleCast', 320, 200);
ctx.font = '14px monospace';
ctx.fillText('MVC2 Online', 320, 230);
ctx.font = '12px monospace';
ctx.fillStyle = '#888';
ctx.fillText('Enter your name and press START to join', 320, 280);

diagEl.textContent = '=== MapleCast ===\nWaiting...';

// Auto-connect on page load
connect();
</script>
</body>
</html>
