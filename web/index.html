<!DOCTYPE html>
<html>
<head>
<title>MapleCast - MVC2 Online</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; color: #0f0; }
canvas { image-rendering: pixelated; border: 2px solid #333; }
#status { margin: 10px; font-size: 16px; text-align: center; }
#lobby { margin: 10px; font-size: 13px; color: #888; }
#controls { margin: 10px; }
#diag { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.9); color: #0f0; font-size: 10px; padding: 8px; border: 1px solid #333; font-family: monospace; white-space: pre; min-width: 260px; }
#info { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.9); color: #0f0; font-size: 12px; padding: 10px; border: 1px solid #333; font-family: monospace; white-space: pre; min-width: 160px; }
button { background: #222; color: #0f0; border: 1px solid #0f0; padding: 10px 20px; margin: 5px; cursor: pointer; font-family: monospace; font-size: 14px; }
button:hover { background: #0f0; color: #000; }
button:disabled { opacity: 0.3; cursor: not-allowed; }
input { background: #111; color: #0f0; border: 1px solid #333; padding: 8px; font-family: monospace; font-size: 14px; width: 200px; text-align: center; }
.slot { display: inline-block; padding: 5px 10px; margin: 3px; border: 1px solid #333; min-width: 180px; text-align: center; line-height: 1.4; }
.slot.taken { border-color: #0f0; color: #0f0; }
.slot.me { border-color: #ff0; color: #ff0; }
.slot.empty { border-color: #333; color: #555; }
</style>
</head>
<body>
<div id="status">MapleCast - MVC2</div>
<iframe id="game" src="emulator.html" style="width:605px;height:600px;border:2px solid #333;" allow="autoplay" scrolling="no"></iframe>
<canvas id="screen" width="1" height="1" style="display:none;"></canvas>
<div id="lobby"></div>
<div id="controls">
  <span id="nameSetup">
    <input id="nameInput" placeholder="Enter your name" maxlength="16" />
    <button onclick="setName()">Set Name</button>
  </span>
  <span id="nameDisplay" style="display:none;color:#0f0;margin-right:10px;"></span>
  <button id="changeNameBtn" onclick="changeName()" style="display:none;font-size:11px;padding:5px 10px;">Change Name</button>
  <button id="nextBtn" onclick="getNext()" style="display:none;">I Got Next</button>
  <button id="registerBtn" onclick="registerStick()" style="display:none;">Register My Stick</button>
  <button id="unregisterBtn" onclick="unregisterStick()" style="display:none;font-size:11px;padding:5px 10px;">Unregister Stick</button>
  <button id="leaveBtn" onclick="leaveGame()" style="display:none;">Disconnect</button>
  <div id="registerStatus" style="display:none;color:#ff0;margin:5px;font-size:13px;"></div>
</div>
<div id="info"></div>
<div id="diag"></div>

<!-- Emulator runs in iframe, _startMirror() available from parent console -->
<script>
  // Bridge _startMirror to iframe
  function _startMirror() {
    var iframe = document.getElementById('game');
    if (iframe && iframe.contentWindow && iframe.contentWindow._startMirror) {
      iframe.contentWindow._startMirror();
    } else {
      console.error('[mirror] Emulator not ready yet');
    }
  }
</script>

<script>
const canvas = document.getElementById('screen');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const infoEl = document.getElementById('info');
const lobbyEl = document.getElementById('lobby');
const diagEl = document.getElementById('diag');
const nextBtn = document.getElementById('nextBtn');
const nameInput = document.getElementById('nameInput');

let ws = null;
let decoder = null;
let frameCount = 0;
let startTime = 0;
let gamepadInterval = null;
let mySlot = -1;

// WebRTC P2P DataChannel
let pc = null;
let videoDc = null;
let inputDc = null;
let useDataChannel = false;

// Audio streaming state
let audioCtx = null;
let audioQueue = [];
let audioChunksReceived = 0;
let audioUnderruns = 0;
let myId = localStorage.getItem('maplecast_id');
if (!myId) { myId = crypto.randomUUID(); localStorage.setItem('maplecast_id', myId); }
let myName = localStorage.getItem('maplecast_name') || '';

// If name already set, show it and hide input
if (myName) {
  document.getElementById('nameSetup').style.display = 'none';
  document.getElementById('nameDisplay').style.display = '';
  document.getElementById('nameDisplay').textContent = myName;
  document.getElementById('changeNameBtn').style.display = '';
  document.getElementById('nextBtn').style.display = '';
  if (localStorage.getItem('maplecast_stick')) {
    document.getElementById('unregisterBtn').style.display = '';
  } else {
    document.getElementById('registerBtn').style.display = '';
  }
} else {
  document.getElementById('nameInput').value = '';
}

function setName() {
  const input = document.getElementById('nameInput');
  const name = input.value.trim();
  if (!name) { input.placeholder = 'Name required!'; return; }
  myName = name;
  localStorage.setItem('maplecast_name', myName);
  document.getElementById('nameSetup').style.display = 'none';
  document.getElementById('nameDisplay').style.display = '';
  document.getElementById('nameDisplay').textContent = myName;
  document.getElementById('changeNameBtn').style.display = '';
  document.getElementById('nextBtn').style.display = '';
  if (localStorage.getItem('maplecast_stick')) {
    document.getElementById('unregisterBtn').style.display = '';
  } else {
    document.getElementById('registerBtn').style.display = '';
  }
}

function changeName() {
  document.getElementById('nameSetup').style.display = '';
  document.getElementById('nameInput').value = myName;
  document.getElementById('nameDisplay').style.display = 'none';
  document.getElementById('changeNameBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
}

function getNext() {
  if (!ws || ws.readyState !== WebSocket.OPEN) { connect(); return; }
  // Try to join directly
  let device = localStorage.getItem('maplecast_stick') ? 'NOBD Stick' : 'Browser';
  const gp = navigator.getGamepads()[0];
  if (gp && !localStorage.getItem('maplecast_stick')) device = gp.id.substring(0, 30);
  ws.send(JSON.stringify({type:'join', id:myId, name:myName, device: device}));
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('nextBtn').textContent = 'Joining...';
}

function registerStick() {
  if (!ws || ws.readyState !== WebSocket.OPEN) { connect(); return; }
  ws.send(JSON.stringify({type:'register_stick', id:myId}));
  document.getElementById('registerBtn').disabled = true;
  document.getElementById('registerBtn').textContent = 'Listening...';
  document.getElementById('registerStatus').style.display = '';
  document.getElementById('registerStatus').textContent = 'Tap any button 5 times, pause, then 5 times again...';
function unregisterStick() {
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({type:'unregister_stick', id:myId}));
  localStorage.removeItem('maplecast_stick');
  document.getElementById('unregisterBtn').style.display = 'none';
  document.getElementById('registerBtn').style.display = '';
  document.getElementById('registerBtn').disabled = false;
  document.getElementById('registerBtn').textContent = 'Register My Stick';
}

  // Auto-cancel after 15 seconds
  window._registerTimeout = setTimeout(function() {
    if (ws && ws.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({type:'cancel_register'}));
    document.getElementById('registerBtn').disabled = false;
    document.getElementById('registerBtn').textContent = 'Register My Stick';
    document.getElementById('registerStatus').textContent = 'Timed out — try again';
    setTimeout(function() { document.getElementById('registerStatus').style.display = 'none'; }, 3000);
  }, 15000);
}

const diag = {
  fps: 0, serverFrame: 0, bytesPerFrame: 0, totalBytes: 0,
  decodeSamples: [], serverPipelineSamples: [], serverEncodeSamples: [],
  serverCopySamples: [], jitterSamples: [],
  prevRecvMs: 0,
  droppedFrames: 0, gamepadActive: false, inputSendCount: 0,
  frameIntervals: [], p1: {}, p2: {},
  decodeStartMs: 0,
  spectators: 0, queue: [],
  pingMs: 0, pingSamples: [],
};

function avg(arr) { return arr.length > 0 ? arr.reduce((a,b) => a+b, 0) / arr.length : 0; }

function updateDiag() {
  const kbps = startTime > 0 ? (diag.totalBytes * 8 / 1000 / ((performance.now() - startTime) / 1000)).toFixed(0) : '0';
  const p1 = diag.p1 || {};
  const p2 = diag.p2 || {};
  const srvPipe = (avg(diag.serverPipelineSamples) / 1000).toFixed(2);
  const srvEnc = (avg(diag.serverEncodeSamples) / 1000).toFixed(2);
  const srvCopy = (avg(diag.serverCopySamples) / 1000).toFixed(2);
  const dec = avg(diag.decodeSamples).toFixed(2);
  const jit = avg(diag.jitterSamples).toFixed(2);
  const fi = avg(diag.frameIntervals).toFixed(1);

  const publishMs = (diag.publishUs / 1000).toFixed(2);
  const streamMbps = (diag.streamKbps / 1000).toFixed(1);

  // E2E estimate: publish + network (~1ms LAN) + client decode
  // Button→Server: input poll (1ms web / 0.3ms NOBD) + server process
  // Button→Screen: above + publish + network + client render
  const p1InputMs = (p1.pps||0) > 1000 ? 0.3 : 1.0;
  const p2InputMs = (p2.pps||0) > 1000 ? 0.3 : 1.0;
  const networkMs = 1.0; // LAN estimate
  const clientRenderMs = 2.0; // WebGL render estimate
  const p1E2E = (p1InputMs + parseFloat(publishMs) + networkMs + clientRenderMs).toFixed(1);
  const p2E2E = (p2InputMs + parseFloat(publishMs) + networkMs + clientRenderMs).toFixed(1);

  const pingMs = diag.pingMs.toFixed(1);

  diagEl.textContent =
`=== MapleCast ===
FPS: ${diag.fps}  Frame: ${diag.serverFrame}

-- Connection --
Ping: ${pingMs}ms
Stream: ${streamMbps} Mbps
Publish: ${publishMs}ms/frame

-- P1 ${(p1.pps||0) > 1000 ? '(NOBD)' : '(Web)'} --
Input: ${p1.pps||0}/s  Chg: ${p1.cps||0}/s
Btn>Server: ${p1InputMs}ms
Btn>Screen: ${p1E2E}ms E2E

-- P2 ${(p2.pps||0) > 1000 ? '(NOBD)' : '(Web)'} --
Input: ${p2.pps||0}/s  Chg: ${p2.cps||0}/s
Btn>Server: ${p2InputMs}ms
Btn>Screen: ${p2E2E}ms E2E

-- Me --
Slot: ${mySlot >= 0 ? 'P'+(mySlot+1) : (window._inQueue ? 'queued' : 'spectator')}
Pad: ${diag.gamepadActive ? 'YES' : 'no'}  Sent: ${diag.inputSendCount}
Ping: ${pingMs}ms  RTT>Screen: ${(parseFloat(pingMs) + clientRenderMs).toFixed(1)}ms`;
}

function initDecoder() {
  // H.264 decoder disabled — WASM mirror handles rendering
}

function updateInfo() {
  const p1 = diag.p1 || {};
  const p2 = diag.p2 || {};
  const p1name = p1.connected ? p1.name : 'open';
  const p2name = p2.connected ? p2.name : 'open';
  const p1type = p1.connected ? (p1.type === 'hardware' ? 'NOBD' : 'Web') : '';
  const p2type = p2.connected ? (p2.type === 'hardware' ? 'NOBD' : 'Web') : '';
  const queue = diag.queue || [];
  let queueList = '';
  if (queue.length > 0) {
    queueList = '\n-- Next Up --\n';
    for (let i = 0; i < queue.length; i++) {
      queueList += `  ${i+1}. ${queue[i]}\n`;
    }
  }
  infoEl.textContent =
`  MAPLECAST  MVC2

P1: ${p1name} ${p1type}
P2: ${p2name} ${p2type}

Watching: ${diag.spectators}
${queueList}`;
}

let lastFrameTime = 0;

function connect() {
  if (ws) { ws.close(); if (gamepadInterval) clearInterval(gamepadInterval); }

  // Connect to WebSocket signaling — auto-detect local vs tunnel
  let url;
  const params = new URLSearchParams(window.location.search);
  const wsOverride = params.get('ws');  // ?ws=wss://tunnel-url.trycloudflare.com
  if (wsOverride) {
    url = wsOverride;
  } else if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
    url = `ws://${window.location.hostname}:7200`;
  } else {
    // On a tunnel/remote domain — assume signaling is on same origin
    const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    url = `${proto}//${window.location.host}`;
  }
  statusEl.textContent = 'Connecting to ' + url + '...';

  ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    statusEl.textContent = 'Connected - watching';
    frameCount = 0;
    startTime = performance.now();
    lastFrameTime = 0;
    nextBtn.disabled = false;
  };

  ws.onmessage = (event) => {
    if (typeof event.data === 'string') {
      try {
        const msg = JSON.parse(event.data);
        if (msg.type === 'register_started') {
          // Server acknowledged, waiting for rhythm
        }
        if (msg.type === 'pong') {
          const rtt = performance.now() - msg.t;
          diag.pingSamples.push(rtt);
          if (diag.pingSamples.length > 10) diag.pingSamples.shift();
          diag.pingMs = diag.pingSamples.reduce((a,b) => a+b, 0) / diag.pingSamples.length;
        }
        if (msg.type === 'assigned') {
          mySlot = msg.slot;
          if (mySlot >= 0) {
            statusEl.textContent = `You are P${mySlot + 1} - FIGHT!`;
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('leaveBtn').style.display = '';
            document.getElementById('changeNameBtn').style.display = 'none';
            window._inQueue = false;
            window._leaving = false;
            startGamepadPolling();
          } else if (window._leaving) {
            // Response to our leave request — just reset
            window._leaving = false;
          } else {
            // Slot full — enter queue
            window._inQueue = true;
            ws.send(JSON.stringify({type:'queue_join', name: myName}));
            document.getElementById('nextBtn').disabled = true;
            document.getElementById('nextBtn').textContent = 'In Queue...';
            document.getElementById('leaveBtn').style.display = '';
            statusEl.textContent = 'In queue - waiting for open slot';
          }
        }
        if (msg.type === 'status') {
          // Update diag with live player stats
          diag.p1 = msg.p1 || {};
          diag.p2 = msg.p2 || {};
          diag.spectators = msg.spectators || 0;
          diag.queue = msg.queue || [];
          // Check if stick registration just completed
          if (diag._wasRegistering && !msg.registering) {
            localStorage.setItem('maplecast_stick', myId);
            clearTimeout(window._registerTimeout);
            document.getElementById('registerBtn').textContent = 'Stick Registered!';
            document.getElementById('registerBtn').disabled = true;
            document.getElementById('registerStatus').textContent = 'Your stick is registered!';
            setTimeout(function() {
              document.getElementById('registerStatus').style.display = 'none';
              document.getElementById('registerBtn').style.display = 'none';
              document.getElementById('unregisterBtn').style.display = '';
            }, 3000);
          }
          diag._wasRegistering = msg.registering;
          diag.serverFrame = msg.frame || 0;
          diag.fps = msg.fps || 0;
          diag.streamKbps = msg.stream_kbps || 0;
          diag.publishUs = msg.publish_us || 0;
          diag.dirtyPages = msg.dirty || 0;
          updateLobby(msg);
          updateInfo();
          // Auto-join from queue when a slot opens
          if (window._inQueue && mySlot < 0) {
            const p1open = !msg.p1 || !msg.p1.connected;
            const p2open = !msg.p2 || !msg.p2.connected;
            if (p1open || p2open) {
              window._inQueue = false;
              ws.send(JSON.stringify({type:'queue_leave'}));
              joinGame();
            }
          }
        }
        // WebRTC removed — using WASM mirror for rendering
      } catch (e) {}
      return;
    }

    // Binary frames handled by WASM mirror, not here
  };

  ws.onclose = () => {
    statusEl.textContent = 'Disconnected';
    nextBtn.disabled = false;
    nextBtn.textContent = 'I Got Next';
    mySlot = -1;
    if (gamepadInterval) clearInterval(gamepadInterval);
  };
  ws.onerror = () => { statusEl.textContent = 'Connection error'; };
}

function setupWebRTC() {
  if (pc) { pc.close(); pc = null; }
  useDataChannel = false;

  const config = {
    iceServers: [

    ]
  };

  // Create DataChannels (browser creates, server accepts via onDataChannel)
  videoDc = pc.createDataChannel('video', { ordered: false, maxRetransmits: 0 });
  inputDc = pc.createDataChannel('input', { ordered: false, maxRetransmits: 0 });
  const audioDc = pc.createDataChannel('audio', { ordered: true, maxRetransmits: 0 });
  videoDc.binaryType = 'arraybuffer';
  inputDc.binaryType = 'arraybuffer';
  audioDc.binaryType = 'arraybuffer';

  const checkReady = () => {
    if (videoDc.readyState === 'open' && inputDc.readyState === 'open') {
      useDataChannel = true;
      console.log('[rtc] P2P DataChannels open — NAT hole-punched');
      statusEl.textContent += ' [P2P]';
    }
  };

  videoDc.onopen = checkReady;
  inputDc.onopen = checkReady;
  videoDc.onclose = () => { useDataChannel = false; console.log('[rtc] video DC closed'); };
  inputDc.onclose = () => { useDataChannel = false; console.log('[rtc] input DC closed'); };

  // Video frames via DataChannel
  videoDc.onmessage = (event) => handleVideoFrame(event.data);

  // Audio playback — raw PCM via ScriptProcessor

    try {

      // Browser autoplay policy: resume on user interaction
      if (audioCtx.state === 'suspended') {
        console.log('[rtc] AudioContext suspended — click page to enable audio');
        const resume = () => {
          audioCtx.resume().then(() => console.log('[rtc] AudioContext resumed'));
          document.removeEventListener('click', resume);
          document.removeEventListener('keydown', resume);
        };
        document.addEventListener('click', resume);
        document.addEventListener('keydown', resume);
      }
      // AudioWorklet runs on dedicated audio thread — never interrupted by main thread
      await audioCtx.audioWorklet.addModule('pcm-worklet.js');
      const workletNode = new AudioWorkletNode(audioCtx, 'pcm-processor', {
        outputChannelCount: [2]
      });

  };
  audioDc.onmessage = (event) => {

function joinGame() {
  getNext();
}

function leaveGame() {
  window._leaving = true;
  if (ws && ws.readyState === WebSocket.OPEN) {
    if (mySlot >= 0) {
      ws.send(JSON.stringify({type:'leave', id:myId}));
    } else if (window._inQueue) {
      ws.send(JSON.stringify({type:'queue_leave'}));
    }
  }
  mySlot = -1;
  window._inQueue = false;
  if (gamepadInterval) clearInterval(gamepadInterval);
  document.getElementById('nextBtn').style.display = '';
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('nextBtn').textContent = 'I Got Next';
  document.getElementById('leaveBtn').style.display = 'none';
  document.getElementById('changeNameBtn').style.display = '';
  statusEl.textContent = 'Connected - watching';
}

function updateLobby(msg) {
  let html = '';
  for (const [slot, label, statsKey] of [['p1','P1','p1'], ['p2','P2','p2']]) {
    const p = msg[slot];
    const s = diag[statsKey] || {};
    if (p && p.connected) {
      const isMe = p.id === myId.substring(0,8);
      const isHw = p.type === 'hardware';
      const cls = isMe ? 'me' : 'taken';
      const deviceTag = isHw ? 'NOBD Stick' : (p.device || 'Browser');
      const rate = s.pps || 0;
      html += `<span class="slot ${cls}">` +
        `<b>${label}: ${p.name}</b>${isMe ? ' (you)' : ''}<br>` +
        `<small>${deviceTag} | ${rate}/s</small>` +
        `</span> `;
    } else {
      html += `<span class="slot empty">${label}: open</span> `;
    }
  }
  const spectators = msg.spectators || 0;
  const queue = msg.queue || [];
  html += `<span class="slot" style="border-color:#555;color:#888;">` +
    `<b>Watching: ${spectators}</b><br>` +
    `<small>Next up: ${queue.length}</small>` +
    `</span>`;
  lobbyEl.innerHTML = html;
}

function startGamepadPolling() {
  if (gamepadInterval) clearInterval(gamepadInterval);
  let prevW3 = null;
  gamepadInterval = setInterval(() => {
    if (!ws || ws.readyState !== WebSocket.OPEN || mySlot < 0) return;
    const gp = navigator.getGamepads()[0];
    if (!gp) { diag.gamepadActive = false; return; }
    diag.gamepadActive = true;

    let btn = 0xFFFF;
    if (gp.buttons[0]?.pressed) btn &= ~0x0004;
    if (gp.buttons[1]?.pressed) btn &= ~0x0002;
    if (gp.buttons[2]?.pressed) btn &= ~0x0400;
    if (gp.buttons[3]?.pressed) btn &= ~0x0200;
    if (gp.buttons[9]?.pressed) btn &= ~0x0008;
    if (gp.buttons[12]?.pressed) btn &= ~0x0010;
    if (gp.buttons[13]?.pressed) btn &= ~0x0020;
    if (gp.buttons[14]?.pressed) btn &= ~0x0040;
    if (gp.buttons[15]?.pressed) btn &= ~0x0080;
    const lt = Math.floor((gp.buttons[6]?.value||0)*255);
    const rt = Math.floor((gp.buttons[7]?.value||0)*255);

    const w3 = new Uint8Array([lt, rt, (btn>>8)&0xFF, btn&0xFF]);
    // Send gamepad input via WebSocket
    ws.send(w3);
    diag.inputSendCount++;
  }, 4); // 250Hz polling
}

diagEl.textContent = '=== MapleCast ===\nWaiting...';

// Connect for lobby/join only — WASM mirror handles video
connect();

// Update diag display + send ping every second
setInterval(() => {
  updateDiag();
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({type:'ping', t: performance.now()}));
  }
}, 1000);
