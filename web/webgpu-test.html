<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MapleCast WebGPU</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#eee;font-family:'Courier New',monospace;display:flex;min-height:100vh}
#main{flex:1;display:flex;flex-direction:column;align-items:center}
h1{font-size:14px;padding:8px;color:#0f0;text-transform:uppercase;letter-spacing:2px}
#wrap{position:relative;border:1px solid #333}
canvas{display:block;background:#000}
#st{padding:8px;font-size:12px;color:#888}
.err{color:#f44}.ok{color:#0f0}
#panel{width:280px;background:#1a1a1a;border-left:1px solid #333;padding:8px;font-size:11px;overflow-y:auto}
#panel h2{font-size:12px;color:#0ff;margin:8px 0 4px;border-bottom:1px solid #333;padding-bottom:2px}
#panel label{display:block;margin:3px 0;cursor:pointer}
#panel input[type=range]{width:100px;vertical-align:middle}
#panel select{background:#222;color:#eee;border:1px solid #444;padding:1px 4px}
#panel .val{color:#0f0;float:right}
</style>
</head>
<body>
<div id="main">
<h1>MapleCast WebGPU Renderer</h1>
<div id="wrap">
    <canvas id="c" width="640" height="480"></canvas>
</div>
<div id="ov" style="font-size:11px;color:#0f0;background:#000;padding:4px 8px;white-space:pre;line-height:1.4;border:1px solid #333;margin-top:4px">Initializing...</div>
<div id="st">Connecting...</div>
</div>
<div id="panel">
<h2>Render Debug</h2>
<label><input type="checkbox" id="dbg_opaque" checked> Draw Opaque</label>
<label><input type="checkbox" id="dbg_punch" checked> Draw Punch-Through</label>
<label><input type="checkbox" id="dbg_trans" checked> Draw Translucent</label>
<h2>Shader Mode</h2>
<label><input type="radio" name="shmode" value="normal" checked> Normal</label>
<label><input type="radio" name="shmode" value="solid"> Solid Color (no tex)</label>
<label><input type="radio" name="shmode" value="uv"> UV Debug</label>
<label><input type="radio" name="shmode" value="depth"> Depth Debug</label>
<label><input type="radio" name="shmode" value="alpha"> Alpha Debug</label>
<h2>Translucent Depth</h2>
<label>DepthFunc: <select id="dbg_trDepth">
<option value="6" selected>greater-equal (flycast)</option>
<option value="7">always</option>
<option value="1">less</option>
<option value="3">less-equal</option>
<option value="0">never</option>
</select></label>
<label><input type="checkbox" id="dbg_trDepthWrite"> Depth Write (trans)</label>
<h2>Alpha</h2>
<label>Discard threshold: <input type="range" id="dbg_alphaDiscard" min="0" max="255" value="1"> <span class="val" id="dbg_alphaDiscardVal">1</span></label>
<label><input type="checkbox" id="dbg_discardTransOnly"> Discard trans only</label>
<label><input type="checkbox" id="dbg_noDiscard"> No alpha discard</label>
<h2>Blend Override</h2>
<label><input type="checkbox" id="dbg_blendOverride"> Override blend</label>
<label>Src: <select id="dbg_blendSrc"><option value="4" selected>SrcAlpha</option><option value="1">One</option><option value="0">Zero</option><option value="2">DstColor</option><option value="5">InvSrcAlpha</option></select></label>
<label>Dst: <select id="dbg_blendDst"><option value="5" selected>InvSrcAlpha</option><option value="1">One</option><option value="0">Zero</option><option value="4">SrcAlpha</option><option value="3">InvSrcColor</option></select></label>
<h2>Culling</h2>
<label><select id="dbg_cull">
<option value="auto" selected>Auto (per-poly)</option>
<option value="none">None</option>
<option value="front">Front</option>
<option value="back">Back</option>
</select></label>
<h2>Texture</h2>
<label><input type="checkbox" id="dbg_texInvalidate"> Force invalidate every frame</label>
<h2>List Inspector</h2>
<label>Trans skip first: <input type="range" id="dbg_trSkip" min="0" max="200" value="0"> <span class="val" id="dbg_trSkipVal">0</span></label>
<label>Trans max draw: <input type="range" id="dbg_trMax" min="0" max="200" value="200"> <span class="val" id="dbg_trMaxVal">200</span></label>
<label>Opaque skip first: <input type="range" id="dbg_opSkip" min="0" max="600" value="0"> <span class="val" id="dbg_opSkipVal">0</span></label>
<label>Opaque max draw: <input type="range" id="dbg_opMax" min="0" max="600" value="600"> <span class="val" id="dbg_opMaxVal">600</span></label>
<h2>Shading Override</h2>
<label><input type="checkbox" id="dbg_shadOverride"> Override ShadInstr</label>
<label>ShadInstr: <select id="dbg_shadInstr">
<option value="-1" selected>Per-poly</option>
<option value="0">0: Replace</option>
<option value="1">1: Modulate RGB</option>
<option value="2">2: Decal</option>
<option value="3">3: Modulate All</option>
</select></label>
<h2>UseAlpha Override</h2>
<label><select id="dbg_useAlpha">
<option value="-1" selected>Per-poly</option>
<option value="0">Force OFF</option>
<option value="1">Force ON</option>
</select></label>
<h2>Live Render Stats</h2>
<pre id="dbg_stats" style="font-size:9px;color:#0f0;background:#000;padding:4px;white-space:pre;overflow-y:auto;max-height:300px;border:1px solid #333">—</pre>
</div>

<script type="module">
import {FrameDecoder} from './webgpu/frame-decoder.mjs';
import {TAParser} from './webgpu/ta-parser.mjs';
import {TextureManager} from './webgpu/texture-manager.mjs';
import {PVR2Renderer} from './webgpu/pvr2-renderer.mjs';

const canvas=document.getElementById('c'), ov=document.getElementById('ov'), st=document.getElementById('st');
let fc=0,lt=performance.now(),fps=0,dMs=0,pMs=0,rMs=0,wB=0;
const ss=(m,c='')=>{st.textContent=m;st.className=c};

// Debug state — read by renderer
window.DBG = {
    drawOpaque: true, drawPunch: true, drawTrans: true,
    shaderMode: 'normal',
    trDepthFunc: 6, trDepthWrite: false,
    alphaDiscard: 1,
    blendOverride: false, blendSrc: 4, blendDst: 5,
    cullOverride: 'auto',
    texForceInvalidate: false,
};

// Wire up controls
document.getElementById('dbg_opaque').onchange = e => DBG.drawOpaque = e.target.checked;
document.getElementById('dbg_punch').onchange = e => DBG.drawPunch = e.target.checked;
document.getElementById('dbg_trans').onchange = e => DBG.drawTrans = e.target.checked;
document.querySelectorAll('input[name=shmode]').forEach(r => r.onchange = e => DBG.shaderMode = e.target.value);
document.getElementById('dbg_trDepth').onchange = e => DBG.trDepthFunc = parseInt(e.target.value);
document.getElementById('dbg_trDepthWrite').onchange = e => DBG.trDepthWrite = e.target.checked;
const alphaSlider = document.getElementById('dbg_alphaDiscard');
alphaSlider.oninput = e => { DBG.alphaDiscard = parseInt(e.target.value); document.getElementById('dbg_alphaDiscardVal').textContent = e.target.value; };
document.getElementById('dbg_blendOverride').onchange = e => DBG.blendOverride = e.target.checked;
document.getElementById('dbg_blendSrc').onchange = e => DBG.blendSrc = parseInt(e.target.value);
document.getElementById('dbg_blendDst').onchange = e => DBG.blendDst = parseInt(e.target.value);
document.getElementById('dbg_cull').onchange = e => DBG.cullOverride = e.target.value;
document.getElementById('dbg_texInvalidate').onchange = e => DBG.texForceInvalidate = e.target.checked;
const trSkip=document.getElementById('dbg_trSkip'),trMax=document.getElementById('dbg_trMax');
const opSkip=document.getElementById('dbg_opSkip'),opMax=document.getElementById('dbg_opMax');
trSkip.oninput=e=>{DBG.trSkip=+e.target.value;document.getElementById('dbg_trSkipVal').textContent=e.target.value;};
trMax.oninput=e=>{DBG.trMax=+e.target.value;document.getElementById('dbg_trMaxVal').textContent=e.target.value;};
opSkip.oninput=e=>{DBG.opSkip=+e.target.value;document.getElementById('dbg_opSkipVal').textContent=e.target.value;};
opMax.oninput=e=>{DBG.opMax=+e.target.value;document.getElementById('dbg_opMaxVal').textContent=e.target.value;};
DBG.trSkip=0;DBG.trMax=200;DBG.opSkip=0;DBG.opMax=600;
document.getElementById('dbg_discardTransOnly').onchange=e=>DBG.discardTransOnly=e.target.checked;
document.getElementById('dbg_noDiscard').onchange=e=>DBG.noDiscard=e.target.checked;
DBG.discardTransOnly=false;DBG.noDiscard=false;
document.getElementById('dbg_shadOverride').onchange=e=>DBG.shadOverride=e.target.checked;
document.getElementById('dbg_shadInstr').onchange=e=>DBG.shadInstr=parseInt(e.target.value);
document.getElementById('dbg_useAlpha').onchange=e=>DBG.useAlphaOverride=parseInt(e.target.value);
DBG.shadOverride=false;DBG.shadInstr=-1;DBG.useAlphaOverride=-1;

async function main(){
    if(!navigator.gpu){ss('WebGPU not supported. Use Chrome 113+.','err');return;}
    const R=new PVR2Renderer();
    try{await R.init(canvas);ss('WebGPU OK','ok');
        R.dev.addEventListener('uncapturederror',(e)=>{console.error('[webgpu]',e.error.message);});
    }catch(e){ss('Init failed: '+e.message,'err');return;}
    const D=new FrameDecoder(),P=new TAParser(),T=new TextureManager(R.dev);

    function connect(){
        ss('Connecting...');
        const ws=new WebSocket('wss://nobd.net/ws');
        ws.binaryType='arraybuffer';
        ws.onopen=()=>ss('Connected — waiting for SYNC','ok');
        ws.onclose=()=>{ss('Disconnected');setTimeout(connect,2000);};
        ws.onerror=()=>{};
        ws.onmessage=(e)=>{
            if(typeof e.data==='string')return;
            const d=new Uint8Array(e.data); wB+=d.byteLength;
            try{
                const t0=performance.now();
                const fr=D.applyFrame(d);
                dMs=performance.now()-t0;
                if(!fr)return;
                // Texture invalidation: full invalidation on VRAM changes for now
                // (dirty-page-aware caching needs more work on page range matching)
                if(!T._lastPvrRegs||fr.vramDirty||DBG.texForceInvalidate){T.invalidateAll();}
                T._lastPvrRegs=D.pvrRegs;
                if(fr.vramDirty||fr.pvrDirty)T.updatePalette(D.pvrRegs);
                const t1=performance.now();
                const g=P.parse(fr.taBuffer,fr.taSize);
                // Fill background polygon from PVR registers + VRAM
                try { P.fillBGP(g, D.pvrRegs, D.vram); } catch(e) { if(fc<2) console.error('[BGP]',e); }
                pMs=performance.now()-t1;
                // Dump Z values for grid vs HUD comparison
                if(fc<2){
                    // Grid polys (early)
                    for(const i of [1,5,10]){
                        if(i>=g.opaque.length)continue;
                        const p=g.opaque[i];if(p.count<3)continue;
                        const bi=p.first*28;const vd=g.vertexData;
                        const z=new Float32Array(vd.buffer,vd.byteOffset+bi+8,1)[0];
                        const logD=Math.log2(1+Math.max(100000*z,-0.999999))/34;
                        console.log(`[GRID] op[${i}] z=${z.toFixed(6)} logD=${logD.toFixed(4)}`);
                    }
                    // HUD polys
                    for(let i=445;i<Math.min(465,g.opaque.length);i++){
                        const p=g.opaque[i];if(p.count<3)continue;
                        const bi=p.first*28;
                        const vd=g.vertexData;
                        const x=new Float32Array(vd.buffer,vd.byteOffset+bi,1)[0];
                        const y=new Float32Array(vd.buffer,vd.byteOffset+bi+4,1)[0];
                        const obj=p.pcw&0xFF,tex=(obj>>3)&1,fmt=tex?((p.tcw>>27)&7):-1;
                        const sb=(p.tsp>>29)&7,db=(p.tsp>>26)&7,si=(p.tsp>>6)&3;
                        const ua=(p.tsp>>20)&1,ita=(p.tsp>>19)&1;
                        const z=new Float32Array(vd.buffer,vd.byteOffset+bi+8,1)[0];
                        const logD=Math.log2(1+Math.max(100000*z,-0.999999))/34;
                        console.log(`[HUD] op[${i}] pos=(${x.toFixed(0)},${y.toFixed(0)}) z=${z.toFixed(6)} logD=${logD.toFixed(4)} cnt=${p.count} R=${vd[bi+12]} G=${vd[bi+13]} B=${vd[bi+14]} A=${vd[bi+15]} | shad=${si} tex=${tex} obj=0x${obj.toString(16)}`);
                    }
                }
                // Live render stats
                if(fc%30===0){
                    const blendModes={},shadInstrs={},texFmts={},listCounts={op:0,pt:0,tr:0};
                    const depthModes={},cullModes={},uaFlags={},itaFlags={};
                    let noTexCount=0,texCount=0,totalVerts=g.vertexCount;
                    const analyze=(list,name)=>{
                        for(const p of list){
                            if(p.count<3)continue;
                            listCounts[name]=(listCounts[name]||0)+1;
                            const tsp=p.tsp,pcw=p.pcw,isp=p.isp;
                            const sb=(tsp>>29)&7,db=(tsp>>26)&7,si=(tsp>>6)&3;
                            const ua=(tsp>>20)&1,ita=(tsp>>19)&1;
                            const tex=(pcw>>3)&1,dm=(isp>>29)&7,cm=(isp>>27)&3;
                            const fmt=tex?((p.tcw>>27)&7):-1;
                            const bk=`${sb}/${db}`;
                            blendModes[bk]=(blendModes[bk]||0)+1;
                            shadInstrs[si]=(shadInstrs[si]||0)+1;
                            if(tex){texCount++;if(fmt>=0)texFmts[fmt]=(texFmts[fmt]||0)+1;}
                            else noTexCount++;
                            depthModes[dm]=(depthModes[dm]||0)+1;
                            cullModes[cm]=(cullModes[cm]||0)+1;
                            uaFlags[ua]=(uaFlags[ua]||0)+1;
                            itaFlags[ita]=(itaFlags[ita]||0)+1;
                        }
                    };
                    analyze(g.opaque,'op');analyze(g.punchThrough,'pt');analyze(g.translucent,'tr');
                    const fmtNames={0:'1555',1:'565',2:'4444',3:'YUV',4:'Bump',5:'Pal4',6:'Pal8',7:'Rsv'};
                    const blendNames={0:'Zero',1:'One',2:'Other',3:'InvOther',4:'SrcA',5:'InvSrcA',6:'DstA',7:'InvDstA'};
                    let s=`LISTS: Op=${listCounts.op||0} PT=${listCounts.pt||0} Tr=${listCounts.tr||0}\n`;
                    s+=`VERTS: ${totalVerts}  TEX: ${texCount}  NOTEX: ${noTexCount}\n\n`;
                    s+=`BLEND MODES:\n`;
                    for(const[k,v]of Object.entries(blendModes).sort((a,b)=>b[1]-a[1])){
                        const[sb,db]=k.split('/');
                        s+=`  ${blendNames[sb]||sb}/${blendNames[db]||db}: ${v}\n`;
                    }
                    s+=`\nSHAD INSTR:\n`;
                    const siNames={0:'Replace',1:'ModRGB',2:'Decal',3:'ModAll'};
                    for(const[k,v]of Object.entries(shadInstrs))s+=`  ${siNames[k]||k}: ${v}\n`;
                    s+=`\nTEX FORMATS:\n`;
                    for(const[k,v]of Object.entries(texFmts))s+=`  ${fmtNames[k]||k}: ${v}\n`;
                    s+=`\nDEPTH MODES:\n`;
                    const dmNames={0:'Never',1:'Less',2:'Equal',3:'LessEq',4:'Greater',5:'NotEq',6:'GreaterEq',7:'Always'};
                    for(const[k,v]of Object.entries(depthModes))s+=`  ${dmNames[k]||k}: ${v}\n`;
                    s+=`\nCULL: `;for(const[k,v]of Object.entries(cullModes))s+=`${k}:${v} `;
                    s+=`\nUseAlpha: `;for(const[k,v]of Object.entries(uaFlags))s+=`${k}:${v} `;
                    s+=`\nIgnoreTexA: `;for(const[k,v]of Object.entries(itaFlags))s+=`${k}:${v} `;
                    document.getElementById('dbg_stats').textContent=s;
                }
                const t2=performance.now();
                // Pass debug state to renderer
                R.renderFrame(g,T,fr.pvrSnapshot,D.vram,DBG);
                rMs=performance.now()-t2;
                fc++;
            }catch(ex){console.error('[webgpu]',ex);}
        };
    }

    (function tick(){
        const now=performance.now(),el=now-lt;
        if(el>=1000){fps=(fc/el*1000).toFixed(1);fc=0;lt=now;}
        const kb=(wB*8/1000).toFixed(0);wB=0;
        const totalMs=dMs+pMs+rMs;
        const budget=(totalMs/16.67*100).toFixed(0);
        const ts=T.stats;
        ov.textContent=`FPS: ${fps}  ${budget}% budget\nDecode: ${dMs.toFixed(2)}ms\nParse:  ${pMs.toFixed(2)}ms\nRender: ${rMs.toFixed(2)}ms\nTotal:  ${totalMs.toFixed(2)}ms\nStream: ${kb} kbps\nFrame:  ${D.frameNum}\nTex$: H=${ts.hits} M=${ts.misses} R=${ts.reused}\nStats:  S=${D.stats.syncs} K=${D.stats.keyframes} D=${D.stats.deltas}`;
        ts.hits=0;ts.misses=0;ts.reused=0;
        requestAnimationFrame(tick);
    })();
    connect();
}
main().catch(e=>{ss('Fatal: '+e.message,'err');console.error(e);});
</script>
</body>
</html>
