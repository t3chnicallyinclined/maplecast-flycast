<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MapleCast WebGPU</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#eee;font-family:'Courier New',monospace;display:flex;min-height:100vh}
#main{flex:1;display:flex;flex-direction:column;align-items:center}
h1{font-size:14px;padding:8px;color:#0f0;text-transform:uppercase;letter-spacing:2px}
#wrap{position:relative;border:1px solid #333}
canvas{display:block;background:#000}
#ov{font-size:11px;color:#0f0;background:#000;padding:4px 8px;white-space:pre;line-height:1.4;border:1px solid #333;margin-top:4px}
#st{padding:8px;font-size:12px;color:#888}
.err{color:#f44}.ok{color:#0f0}
#panel{width:280px;background:#1a1a1a;border-left:1px solid #333;padding:8px;font-size:11px;overflow-y:auto}
#panel h2{font-size:12px;color:#0ff;margin:8px 0 4px;border-bottom:1px solid #333;padding-bottom:2px}
#panel label{display:block;margin:3px 0;cursor:pointer}
#panel input[type=range]{width:100px;vertical-align:middle}
#panel select{background:#222;color:#eee;border:1px solid #444;padding:1px 4px}
#panel .val{color:#0f0;float:right}
</style>
</head>
<body>
<div id="main">
<h1>MapleCast WebGPU (Worker Thread)</h1>
<div id="wrap">
    <canvas id="c" width="640" height="480"></canvas>
</div>
<div id="ov">Initializing worker...</div>
<div id="st">Starting...</div>
</div>
<div id="panel">
<h2>Render Debug</h2>
<label><input type="checkbox" id="dbg_opaque" checked> Draw Opaque</label>
<label><input type="checkbox" id="dbg_punch" checked> Draw Punch-Through</label>
<label><input type="checkbox" id="dbg_trans" checked> Draw Translucent</label>
<h2>Shader Mode</h2>
<label><input type="radio" name="shmode" value="normal" checked> Normal</label>
<label><input type="radio" name="shmode" value="solid"> Solid Color</label>
<label><input type="radio" name="shmode" value="uv"> UV Debug</label>
<label><input type="radio" name="shmode" value="depth"> Depth Debug</label>
<label><input type="radio" name="shmode" value="alpha"> Alpha Debug</label>
<h2>Translucent Depth</h2>
<label>DepthFunc: <select id="dbg_trDepth">
<option value="6" selected>greater-equal</option><option value="7">always</option></select></label>
<label><input type="checkbox" id="dbg_trDepthWrite"> Depth Write (trans)</label>
<h2>Texture</h2>
<label><input type="checkbox" id="dbg_texInvalidate"> Force invalidate</label>
</div>

<script type="module">
const canvas = document.getElementById('c');
const ov = document.getElementById('ov');
const st = document.getElementById('st');
const ss = (m, c='') => { st.textContent = m; st.className = c; };

// Debug state — sent to worker on change
const DBG = {
    drawOpaque: true, drawPunch: true, drawTrans: true,
    shaderMode: 'normal', trDepthFunc: 6, trDepthWrite: false,
    texForceInvalidate: false,
};

// Wire up controls
document.getElementById('dbg_opaque').onchange = e => { DBG.drawOpaque = e.target.checked; sendDbg(); };
document.getElementById('dbg_punch').onchange = e => { DBG.drawPunch = e.target.checked; sendDbg(); };
document.getElementById('dbg_trans').onchange = e => { DBG.drawTrans = e.target.checked; sendDbg(); };
document.querySelectorAll('input[name=shmode]').forEach(r => r.onchange = e => { DBG.shaderMode = e.target.value; sendDbg(); });
document.getElementById('dbg_trDepth').onchange = e => { DBG.trDepthFunc = parseInt(e.target.value); sendDbg(); };
document.getElementById('dbg_trDepthWrite').onchange = e => { DBG.trDepthWrite = e.target.checked; sendDbg(); };
document.getElementById('dbg_texInvalidate').onchange = e => { DBG.texForceInvalidate = e.target.checked; sendDbg(); };

let worker = null;
function sendDbg() { if (worker) worker.postMessage({ type: 'dbg', dbg: DBG }); }

// Start worker
try {
    if (!navigator.gpu) { ss('WebGPU not supported', 'err'); }
    else {
        const offscreen = canvas.transferControlToOffscreen();
        worker = new Worker('./webgpu/render-worker.mjs', { type: 'module' });

        worker.onmessage = (e) => {
            const msg = e.data;
            switch (msg.type) {
                case 'ready':
                    ss('Worker ready — WebGPU initialized', 'ok');
                    break;
                case 'ws_open':
                    ss('Connected — rendering', 'ok');
                    break;
                case 'ws_close':
                    ss('Disconnected — reconnecting...', 'err');
                    break;
                case 'error':
                    ss('Error: ' + msg.message, 'err');
                    console.error('[worker]', msg.message);
                    break;
                case 'telemetry':
                    updateOverlay(msg);
                    break;
            }
        };

        worker.postMessage({
            type: 'init',
            canvas: offscreen,
            wsUrl: 'wss://nobd.net/ws',
        }, [offscreen]);

        ss('Starting worker...', 'ok');
    }
} catch (err) {
    ss('Failed: ' + err.message, 'err');
    console.error(err);
}

function updateOverlay(t) {
    const budget = (t.maTotal / 16.67 * 100).toFixed(0);
    ov.textContent =
`══ WebGPU Worker Thread ══════════
FPS: ${t.fps}  |  ${budget}% budget
─── Moving Averages ──────────────
Decode:  ${t.maDecode.toFixed(2)}ms  (zstd+delta)
Parse:   ${t.maParse.toFixed(2)}ms  (TA→verts)
Render:  ${t.maRender.toFixed(2)}ms  (GPU draw)
Total:   ${t.maTotal.toFixed(2)}ms
─── E2E Latency ──────────────────
Avg:     ${t.maE2E.toFixed(2)}ms
Min:     ${t.e2eMin.toFixed(2)}ms
Max:     ${t.e2eMax.toFixed(2)}ms
─── Stats ────────────────────────
Frames:  ${t.totalFrames} | Passes: ${t.passes}
Tex$:    H=${t.texHits} M=${t.texMisses} R=${t.texReused}
Frame:   ${t.frameNum} | S=${t.syncs} K=${t.keyframes}
══ Main thread FREE ══════════════`;
}
</script>
</body>
</html>
